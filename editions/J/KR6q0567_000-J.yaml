body:
  text: 元潔瑩禪師語錄目錄卷第一住洪都寧州古洞山阿耨禪寺語錄住楚蒲圻玉崖山上方禪寺語錄卷第二住浙江湖州弁山龍華禪寺語錄住江南廣陵平山棲靈禪寺語錄卷第三住洪都寧州雲巖無住禪寺語錄卷第四住澧州藥山慈雲禪寺語錄復住寧州雲巖無住禪寺語錄卷第五住越州雲門顯聖禪寺語錄住台州天台護國禪寺語錄卷第六示眾小參卷第七普說垂語代語機緣卷第八拈古頌古卷第九代古法語示語佛事卷第十像贊行狀塔銘元潔瑩禪師語錄目錄終
