body:
  text: 嗣法門人智祥編拈古舉僧問長慶有問有答賓主歷然無問無答時如何慶曰怕爛卻那僧問睦州有問有答賓主歷然無問無答時如何州曰相逢盡道休官去林下何曾見一人師曰二老較儉不較奢洞山但向道心不負人而無慚色舉黃檗示衆云汝等諸人盡是噇酒糟漢與麼行腳何處更有今日還知大唐國裏無禪師麼時有僧問秪如諸方匡徒領衆為什麼卻道無禪檗曰不道無禪秪是無師師曰黃檗雖則眼蓋乾坤氣吞寰宇要且太煞嘮嚷還有知黃檗落處的麼良久曰險舉百丈每上堂有一老人常隨衆聽法衆退老人不退丈問汝何人也曰吾非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某甲對曰不落因果遂五百生墮野狐身今請和尚代一轉語貴脫狐身丈曰問來乃問大修行人還落因果也無丈曰不昧因果老人言下大悟作禮曰某甲已脫野狐身住在山後敢乞依亡僧事例丈合維那白椎告衆食後送亡僧衆驚異食後丈領衆至山後巖下以杖挑出一死野狐乃依法火葬師曰叢林盡道不落墮因果不昧脫因果洞山敢道饒你總不恁麼道亦未嘗脫得他野狐身在且道利害在甚麼處貪觀天上月失卻手中橈舉梁山觀禪師因僧問家賊難防時如何山曰識得不為冤曰識得後如何山曰貶向無生國裏曰莫是他安身立命處麼山曰死水不藏龍曰如何是活水龍山曰興波不作浪曰忽然傾湫倒嶽時如何山下座把住曰莫教溼卻老僧袈裟角師曰家清顯孝子國戰有謀臣當時梁山只少一著且道少那一著良久曰休瞌睡舉雲居膺禪師上堂曰如人將三貫錢買一隻獵犬秪解尋得有蹤蹟的忽遇羚羊挂角莫道蹤蹟氣息也無僧問羚羊挂角時如何居曰六六三十六曰挂角後如何居曰六六三十六僧舉似趙州州曰雲居師兄猶在僧便問羚羊挂角時如何州曰九九八十一挂角後如何州曰九九八十一僧曰請和尚指示州曰新羅新羅師曰一人高高山頂立要下下不得一人深深海底行要出出不得好各與二十拄杖何故一對無孔鐵鎚舉仰山坐次大禪佛翹一足云西天二十八祖亦如是唐土六祖亦如是天下老和尚亦如是某甲亦如是山下禪床打四藤條後到霍山自云集雲峰下四藤條天下大禪佛參霍山云打鐘著禪便走去師曰霍山當時待他恁麼道便好捺倒亦只打四下管教者漢更疑三十年去在舉僧問趙州狗子還有佛性也無州曰無僧曰上至諸佛下至螻蟻皆有佛性狗子為甚卻無州曰為伊有業識在著云錯又僧問狗子還有佛性也無州曰有僧曰既有因甚又鑽入者皮袋裏州曰為他知而故犯著云錯師曰浩浩商量者極多錯會者不少洞山要與趙州老人相見下得兩錯未審諸人如何與洞山相見舉玄沙和尚示衆曰深山懸巖千年萬年人跡不到處還有佛法也無若道有喚甚麼作佛法若道無佛法卻有不到處師曰恁麼說話可惜狼藉舉趙州問南泉知有的人向甚處去泉曰山前檀越家作一頭水牯牛去州曰謝師答話泉曰昨夜三更月到窗雲峰曰南泉若無後語洎被打破蔡州徑山曰雲峰老人失卻一隻眼殊不知只因後語當下打破蔡州師曰雲峰看樓打樓徑山因孔著楔若約衲僧眼目敢保俱未夢見在且道洞山有甚長處良久曰獅子不食鵰殘俊鶻不打死兔舉藥山晚參不點燈乃垂語云我有一句子待特牛生兒即向汝道時有僧便出云特牛生兒也秪是和尚不道山喚侍者將燈來其僧抽身入衆師曰藥山要此話行拗直作曲者僧看孔著楔快便難逢仔細看來大家不了洞山亦有一句子待露柱生兒即向你道或有僧出云露柱生兒也秪是和尚不道但向道我也情知你在鬼窟裏作活計舉丹霞訪龐居士值靈照攜籃洗菜便問居士在否照放下籃霞又問居士在否照提籃便行霞便回照歸舉似居士士曰丹霞聻照曰當時便去也士曰赤土塗牛妳師曰丹霞點即不到靈照到即不點龐公雖則冷眼難瞞也只見得一半檢點將來各與二十拄杖何故洞山門下賞罰分明舉趙州一日遇一婆子問云什麼處去婆曰偷趙州筍去州曰忽遇趙州時如何婆便一掌州休去師曰都道當仁不讓誇他婆子好手誰知正晝問金須讓趙州老漢舉僧問智門祚禪師蓮花未出水時如何門曰蓮花僧曰出水後如何門曰荷葉師曰言無展事語不投機舉僧問淨衆信禪師蓮花未出水時如何衆曰菡萏滿池流僧曰出水後如何衆曰葉落不知秋師曰承言者喪滯句者迷舉九峰滿禪師問新到近離什麼處曰閩中峰曰遠涉不易曰不難動步便到峰曰有不動步者麼曰有峰曰爭得到者裏僧無對峰以拄杖趁下師曰為人為徹殺人見血固是九峰一片熱腸可惜者僧不善為客勞煩主人若是箇衲僧但道大似不曾行腳管取者棒別有分付舉芭蕉徹禪師因僧問云有一人不捨生死不證涅槃師還提攜也無徹曰不提攜曰為甚不提攜徹曰山僧粗識好惡天童覺禪師曰若有問長蘆便和聲打為甚如此我從來不識好惡師曰芭蕉雖識好惡大似醉後添杯要活者僧不得天童不識好惡是則驅耕奪食雖活者僧未免傷鋒犯手若有問新豐但向道利劍不斬死漢若是箇衲僧管取別有生涯舉魯祖山寶雲禪師嘗見僧來便面壁南泉聞曰我尋常向師僧道向佛未出世時會取尚不得一箇半箇他恁麼地驢年去在玄覺拈云為復唱和語不肯語師曰不可更為蛇畫足也舉秀大師偈曰身似菩提樹心如明鏡臺時時勤拂拭勿使惹塵埃六祖曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃師曰秀師海底揚塵六祖空中畫彩仔細看來也是徐六擔板何故不見道我王庫內無如是刀舉世尊因長爪梵志索論義預約曰我義若墮當斬首以謝世尊曰汝義以何為宗志曰我以一切不受為宗世尊曰是兒受否志拂袖而去行至中途有省乃歎曰我義兩處負墮是見若受負門處粗是見不受負門處細一切人天二乘不知我義負墮處惟有世尊諸大菩薩知我義墮回至世尊前曰我義兩處負墮故當斬首以謝世尊曰我法中無如是事汝當回心向道於是五百徒衆一時投佛出家證阿羅漢果師曰開口成雙橛無言落二三還有為外道相救者麼維那請師代外道如何免得負墮師代曰待世尊云你以何為宗便好向道一釣便上不惟截斷世尊絡索亦免後來鑽龜打瓦那云世尊是一切智人也須救取始得師代世尊云你於我佛法中作得一箇外道舉溈山示衆曰老僧百年後向山下作一頭水牯牛左脅下書五字曰溈山僧某甲此時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧喚作甚麼即得仰山出禮拜而退師曰子承父業幸有仰山若是箇當仁不讓的但以手作牽鼻勢曰皈依佛皈依法管教聞者見者鼻痛三日舉百丈謂衆日併卻咽喉脣吻道將一句來溈山曰卻請和尚道丈曰不辭向汝道恐已後喪我兒孫五峰曰和尚也須併卻丈曰無人處斫額望汝問雲巖巖曰某甲有道處請和尚舉丈便舉巖曰和尚今有也丈曰喪我兒孫師曰三個老漢恁麼酬對且道還有優劣也無若道有春色無高下若道無花枝有短長洞山亦道一句只是不許作道理會若作道理會喪我兒孫拈拄杖便歸方丈舉風穴上堂曰若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安貼師曰風穴將十方常住一片田地開兩路門頭與人較奢論富美則美矣簡點將來少些大人氣象洞山則不然卓拄杖曰蕩蕩皇風成一片不知何處有封疆舉雲居因僧問僧家畢竟如何居曰居山好僧禮拜居曰你作麼生會曰僧家畢竟於善惡生死逆順境界其心如山不動居乃打曰孤負先聖喪我兒孫又問旁僧你作麼生會曰僧家畢竟眼不觀玄黃之色耳不聽絲竹之聲居曰孤負先聖喪我兒孫師曰雲居好片穩密田地等閒道一句子無一點玄妙道理又爭怪者二僧錯會或有問新豐僧家畢竟如何向道居山好待僧禮拜便問伊作麼生會擬開口便棒打出亦復問旁僧你作麼生會待伊開口亦打出驀召衆云大衆且道是同是別還有定當得出的麼時有僧出禮拜起師便棒曰辜負先聖喪我兒孫舉辨山久默禪師室中示衆云趙州鬥劣不鬥勝文遠輸卻胡餅一箇辨山今日鬥勝不鬥劣時有僧曰我是獅子山曰我是文殊僧曰我是釋迦山曰猶是山僧七代孫師曰趙州辨山二老雖則眼空宇宙只在輸嬴勝劣裏著倒不能坐斷天下人舌頭洞山今日也豎箇義未審諸人如何相委良久曰我害癡西堂率衆禮拜師便起身舉鏡清問靈雲混沌未分時如何雲云露柱懷胎清云分後如何雲曰如片雲點太清裏清云秪如太清還受點也無雲不對清云恁麼則含生不來也雲亦不對清云直得純清絶點時如何雲曰猶是真常流注清云如何是真常流注雲曰似鏡常明清云向上還有事也無雲曰有清云如何是向上事雲曰打破鏡來與子相見天童覺和尚云分與未分玉機夜動點與不點金梭暗拋直得一色純清未是十成安穩且道打破鏡來向什麼處相見清秋老兔吞光後湛水蒼龍蛻骨時師曰天童古佛大似花裏呈春化工巧手直饒臨摹得出轉失本真若是打破鏡來相見端的未得在試問諸仁畢竟作麼生是打破鏡來相見的時節良久一齊打散歸方丈舉仰山一日有梵僧從空而至山曰近離甚處僧曰西天山曰幾時離彼僧曰今早山曰何太遲生僧曰遊山玩水山曰遊戲神通則不無佛法須還老僧始得僧曰特來東土禮文殊卻遇小釋迦遂出梵書貝多葉與山作禮乘空而去自此號小釋迦師曰仰山被梵僧塗污一上梵僧被仰山當面熱瞞簡點得出許伊具一隻眼頌古世尊初生才出娘胎露一機風景不似太平時直饒傾盡天河水難洗從前是與非升座遲遲春日麗融和簇簇飛花度薜蘿將謂東風收拾盡不知狼藉幾何多拈花家私狼藉不堪珍卻又無端假賣春怪俏頭陀微一笑不知賺殺幾多人未離兜率已降皇宮不道太平家業喪誰論弱水羽毛傾日頭只見東邊出知是黃河幾度清達磨見武帝瑤琴一曲舊來長逐逐東風鼓畫堂夜靜天街人睡穩又隨流水渡瀟湘江波一葦兮春光媚野熊耳獨坐兮秋色盈腔僧辭趙州州曰有佛處不得住無佛處急走過僧云恁麼則不去也州云摘楊花摘楊花有佛處不得住荊棘園林蕃鐵樹無佛處急走過攛掇泥牛拽水磨恁麼則不去也囉囉哩哩哩哩囉阿呵呵摘楊花解笑還他老作家盤山上堂云三界無法何處求心謂鏡生花難足信云牛無角轉為淆誰人解笑盤山老平地無端更喫交百丈再參馬師奮迅鎚轟然塗毒鼓非惟三日聾直下雙眉瞽從此門風大展開兒孫箇箇亡規矩咄百丈野狐老人不落百丈不昧獅子驚群瞎驢成隊風遞薔薇別院香雨過青山如潑黛打破醬甕故園透出一枝紅忙煞鄰家滿院蜂可惜枝頭無限意徒教狼藉在東風僧問百丈如何是奇特事丈曰獨坐大雄峰僧禮拜丈便打祖印高提正令威雄峰獨坐鼓風雷堪憐多少風塵客開眼堂堂被活埋黃檗在百丈開田歸丈云運闍黎開田不易檗云隨衆作務丈云有煩道用檗云爭敢辭勞丈云開得多少田地檗將鋤築地三下丈便喝檗掩耳而出拈來一枝無孔笛彼此相將無隱匿一曲長歌帶月歸瀟湘幾度令人憶夾山參船子三寸離鉤毒鼓震三橈劈面全機盡雖然瞥爾點頭歸未免令人成話柄不話柄月滿華亭萬水悠風清夾嶺千峰靜僧哭上百丈法堂就裏藏鋒覿面呈雄峰忒煞為人深一時埋卻無回互千古令人話轉新百丈普請鋤地一僧聞鼓聲笑歸叢林好箇慣家流得意濃時俏莫儔不是堂前雙眼碧看伊何處販楊州僧問百丈超禪師某甲今日辭去或有人問和尚說什麼法向他道什麼超云但道大雄山頂上虎生獅子兒月挂松蘿影半籠秋波隱隱話難窮一聲漁笛煙霄裏透出雲山幾萬重凌行婆見浮杯春到園林草木菲時人那識箇中機黃鸝上苑歌聲滑紫燕梁間語更微音落落草葳葳山花無限東風裏漁笛新腔駐夕暉雲居膺禪師示衆云如隻獵犬尋得有蹤跡的忽遇羚羊挂角莫道蹤蹟氣息也無僧問羚羊挂角時如何膺云六六三十六日挂角後如何膺曰六六三十六其僧舉似趙州州曰雲居師兄猶在僧便問羚羊挂角時如何州曰九九八十一曰挂角後如何州曰九九八十一僧曰請和尚指示州曰新羅新羅六六三十六九九八十一唐言到彼岸梵語波羅密翻也翻了譯也譯出教海禪河沒處安還應分付甌峰頂石橋畔兩箇沒巴鼻的白拈老賊咄龍牙參翠微臨濟將軍帶甲走邊營三尺逢人密密擎一帶封疆渾把住從教得喪競頭爭興化擯維那青天雲蘸碧潭空匝地轟雷鼓黑風驟雨漫漫沉巨浸幾人知是看飛龍永明慧日禪師云意絶思惟鑒徹十方之際佛不說法聞通無盡之音摩訶迦葉強猶知不二維摩枉措辭萬水千山窮不徹一鉤新月畫娥眉石門徹禪師僧問年窮歲盡時如何徹云東村王老夜燒錢東村王老夜燒錢開得脣來便了然不似石人衫子破挂人齒頰被人嫌牛頭未見四祖時天人送供百鳥銜花見後杳無消息春律灰飛管秋飆葉落桐近看花更好不似去年紅婆子請趙州轉藏雲飛石壁山僧色風落寒潭水畫眉最喜上林清興鳥聲聲啼在緑楊枝女子出定文殊伎倆特甚罔明卻也瞞頇可笑瞿曇女子兩兩各不成雙須領略謾惆悵霧鎖晴空連嶽秀風拖白練帶煙長殃崛救産由來彼此盡懷胎怪云聖語兩和諧了事衲僧聞舉著好將黃面一坑埋一坑埋謾疑猜昨夜東風來嶺畔鳥啼花笑滿山隈夜半正明宮漏沉沉玉枕寒禁門深鎖未排班簾垂夜閣香銷永獨露臺前古鏡顏天曉不露太陽日午正三更雙眼離婁也合盲鶖子律陀徒有智到來罔象自分明洞山掇退果卓拄天拄地黑如漆位轉功該眼似眉謾向太虛分兩岸一毫頭上覆須彌洞山示衆言無展事語不投機乘言者喪滯句者迷大唐國裏打鼓新羅鬧市談禪好笑雲門扇子𨁝跳三十三天藏身處沒蹤蹟沒蹤跡處莫藏身丹桂不能籠玉兔碧潭豈肯墜蒼龍金烏昨夜懸西嶺照見扶桑那畔紅石頭示衆云言語動用沒交涉藥山云非言語動用亦沒交涉頭云我者裏針劄不入山云我者裏如石上栽花合浦珠含碧藍田玉吐香波斯無著處滿使鐵船裝僧問雲居僧家畢竟如何居云居山好僧家畢竟居山好一曲臨風無不了自是柴扉久不關落花滿地從風掃僧問雲居六戶不明時如何居曰不涉緣曰向上事如何居云慎者不護黃金殿上無人候白玉階前絶往回幾度春風飛不到從教門徑冷生苔僧問曹山朗月當空時如何山曰猶是階下漢僧曰請師接上階山曰月落後來相見朗月當空故問津曹山直指禁庭深直教月落來相見要接威音那畔人僧問曹山清鋭孤貧乞師拯濟山曰闍黎近前來鋭近前山曰清源白家酒三盞喫了猶道不沾唇黃金沉卻佃官錢故慨孤貧乞見憐最毒曹山人面虎相逢笑臉使瞋拳玄沙見三人新到自打普請鼓三下卻歸方丈新到具威儀了亦去打普請鼓三下卻入僧堂久住白師云新到輕欺和尚師云打鐘集衆勘過衆集新到不赴師令侍者去喚新到才至法堂卻向侍者背上拍一下云和尚喚汝侍者至師處新到便歸堂久住乃問和尚何不勘新到師云我與汝勘了也須彌南畔日頭落北俱盧州正五更最苦好是新羅客矇朧猶在夢中行僧問洞山和尚教學人行鳥道未審如何是鳥道山云不逢一人曰如何行山曰直須足下無私去曰秪如行鳥道莫便是本來面目麼山云闍黎因什麼顛倒曰什麼處是學人顛倒山云若不顛倒因甚認奴作郎曰如何是本來面目山云不行鳥道不行鳥道猶沉轍縱步行來亦轉迂踏斷石橋南岸柳自然寥廓出通塗僧問同安丕禪師如何是和尚家風安云金雞抱子歸霄漢玉兔懷胎出紫微曰忽遇客來將何秪待安云金果早朝猿摘去玉花脫後鳳銜歸簾垂黃閣煙籠曉鳳入蒼梧夜未闌莫謂客來亡款待玉花金果滿盤餐僧問同安志禪師凡有言句盡落今時學人上來請師直指安云目前不現句後不迷進云如何是向上事安云回然不換標的即乖古洞雲深夜寂寥玉人慵肯坐清霄等閒唱出聲前韻自別宮商角徵調洞山不安僧問和尚病還有不病者麼山云有曰不病者還看和尚否山云老僧看他有分曰和尚看他時如何山云老僧看他時則不見有病相逢不識夜更闌就位忘功海嶽寒拈卻髑髏三尺暗碧天雲外不相干長爪梵志索論義口縫未開成話墮那堪刺腦入膠盆爭如善便觀韜略不動纖塵立赤幡從漪到西院陷虎機深不轉眉當陽誰許正眸窺縱饒獨脫羅籠手未免遭他腦後槌休辨別謾狐疑不動干戈全勝俟綸巾羽扇任相隨僧問梁山如何是祖師西來意山云莫亂道烈焰叢中標月指電華影裏露光芒未開口縫親拈得始信梁山舌廣長見見之時見非是見四句古鏡菱花不照春漚花影裏若為真自從尚父歸西伯誰更江頭把直綸知見立知即無明本四句溪西雞齊啼屋北鹿獨宿南泉兩株松多福數莖竹林靜境猶閒山空雲愈肅堪嗟世上人幾箇忘機軸圓覺居一切時不起忘念八句簾外風輕來燕雀池邊沙暖宿鴛鴦年前幾隊穿花蝶只見飛來逐晚香清淨行者不入涅槃二句白雲深處不曾居豈肯將身伴草廬嘗到洛陽花社裏笑看潘閬倒騎驢法身昨夜露柱喫一跌曉來燈籠痛不徹須彌控訴妙高王直至於今笑不歇涅槃四生生生春林花茂艷陽天李白桃紅在處妍野老升平無活計村歌社舞樂堯年不生生澄澄虛碧鎖寒空湛湛秋光景愈溶莫謂玉人沉夜永等閒歌舞月明中生不生花開花卸本無情雲去雲來孰謂真大用繁興元戀朕縱橫那復有纖塵不生不生木人不打新羅鼓石女停篙拄鐵船折角泥牛吞卻月三更紅日黑漫漫般若無知無所不知懷胎石女不梳頭古鏡塵埋獨倚樓卻笑嬋娟無禁拒年來年去下滄洲黃龍三關我手何似佛手拈起須彌倒走若是獅子之兒定不落人窠臼我腳何似驢腳放開頂門一著可憐眼內無筋往往被人穿卻人人有箇生緣玄沙不出飛猿未動腳跟薦得已遭紅線抽牽正偏五位正中偏古殿光騰未兆前鳥雞啄破無明卵照徹東方萬八千偏中正法法頭頭無少剩森羅萬象絶纖塵誰能更把空王令正中來龜毛兔角謾安排出沒本能該世界豈同諸類混塵埃兼中至妙用無私靡不備箇中本自絶參商擬議直教髑髏碎兼中到有無今古不相到泥牛撞倒乳香幢直至而今不得號功勳五位金殿蕭蕭玉漏沉何妨御轂展經綸瑤階襲襲香風遞六國陶然總是春向一點忠心奉紫宸乾乾終日已忘誠紫微廊下抽身過那見從前染汙人奉珊瑚枝上月沉西水底燈花爛熳時露柱燈籠頻斫額爭看石虎夜生兒功風搖遠岸虛含碧雨洗長空煙黛濃吳越相看收不得和雲飄散玉霄峰共功擊碎玄關鳥道虛寥然風物冷除除鐵牛罷耕空劫地到此休誇罔象圖功功曹山三墮髏墮蹤跡溪山近悠然曠邈哉任教頭角異渾不帶纖埃隨墮山色雲間媚水聲花下肥騰騰遊歷遍何嘗得點歸尊貴墮闤闠不相識天涯絶比鄰位焉隆化育端自不知名汾陽三訣第一訣衲僧難辨別春風百草頭無端渾漏泄第二訣吹毛光照雪嘉州大象寒陝府牛喫跌第三訣萬里關河截泛起生鐵船倒載西江月
