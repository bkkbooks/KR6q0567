body:
  text: 嗣法門人智祥編上堂住洪都寧州古洞山阿耨禪寺順治癸巳仲秋師受州主張公暨屬郡衆護法請於本州雲巖禪寺開法上堂拈香祝聖畢乃曰威音那畔一句圓該全體現前纖塵不立直得淨裸裸無縫罅赤灑灑絶周遮世尊以此拈花迦葉以此微笑達磨以此西來六祖以此傳衣青原以此聖諦不為石頭以此鈯斧居曰藥山以此長嘯千里本寺堂上無住晟祖以此寶鏡弘開乃謂背觸俱非如大火聚逮至八百餘載道遠人荒幸遇州主張公藉此一段奇緣康濟兆民不資餘力今請山僧升座舉揚使未見者見未聞者聞未信者信未證者證挽古風於既墜回佛日於緣生即此便見伏中寶藏全彰衣裏明珠顯現既然如是因甚又道百姓日用而不知聻不見此山真面目都緣身在此山中雲巖七堂洎諸山耆宿請上堂十二年來未出山了無消息到人間相逢盡扣拈花旨未委何人解破顏左右顧視曰便恁麼委去猶較些子更若播兩片皮未免鈍置諸公去也便下座大鑊成請上堂豎拂子曰大衆你看拂子一時現出相好光明威德殊勝不離本際度四十二恆河沙佛土置衆香國於新豐以諸如來大悲所熏甘露法味所食之餘供養過現未來而作佛事令其食者不樂小乘得弘大道未入正位者得入正位已入正位者得心解脫已發大乘意者得無生忍得無生忍者至一生補處各各隨其根性皆得饒益秪今葉耀寰開鑊修供又且如何稱揚合掌曰端坐受供養施主常安樂僧問黃閣簾垂雞鳴子夜庭前走紫羅帳合珍珠暗撒是誰知師曰方外不許論量結制上堂惺惺的若教懞懂鑑水無龍隱懵懂的若教惺惺枯木有花開更若示機立境舉古驗今正是簸土揚塵拋沙撒糞特達漢一踏踏翻那討許多波吒還有斷得底麼不住舊時無向背外尋知識總非真冬節上堂心不是佛智不是道衲僧頂門別有一竅喝一喝曰夜來霜氣重偏發一枝花上堂舉一不得舉二放過一著落在第二喝一喝曰會麼落二落三了也便下座冰谷闍黎請上堂一毫頭上覆乾坤百億須彌海嶽渾迸出些兒無礙力人間天上獨稱尊玄中不失偏處不逢舉眼盡是兒孫事祖父從來不出門臘八解制上堂釋迦老子未上雪山人人鼻孔撩天剛謂夜睹明星悟道箇箇眼光擢地後代兒孫根性狹劣只管長期短期大似渴鹿逐陽焰結制解制無異癡猿捕水月秪如不涉迷悟生死覿面一機分付阿誰待汝心肯處即是運通時宋侍御誕辰請上堂空劫威音外塵塵無向背壺天不夜時剎剎露全機全機露也萬象不能掩其輝向背忘也千靈無以匿其耀直得舉足下足無非本地風光居塵出塵不同萬物流轉一花一香莊嚴實際一禮一懺回向真如秪如轉功就位一句又作麼生良久曰無限風光大地春周居士懺罪請上堂煦日輝輝爍破千重障翳和風蕩蕩吹開百劫花心直得巖樹庭莎挺無邊妙相泥團土塊發一切智光且道是何人分上事周公栗仲身處名門不染世樂茲因足病謹請升座舉揚般若以消宿障昔有居士身纏風恙乞二祖懺罪祖曰將罪來與汝懺士良久推其罪性不在內外中間如其心然佛法無二乃對曰覓罪性了不可得祖曰與汝懺罪竟山僧亦有箇古方任他宿障業障報障無不靈驗卓拂曰過去業無定相不可得現在業無住相不可得未來業無至相不可得既總不得脫體無依一句又作麼生豎拂曰花街柳巷無相識始見從前絶學人佛誕上堂呈拄杖曰離言離相明明聲色難該絶聖絶凡歷歷覆藏不可於此會得念念釋迦出世塵塵彌勒下生直得天雨四花地搖六震又豈特九龍吐水沐金軀優曇現作獅子吼秪如因齊慶讚一句又作麼生雲出遠峰山積翠月臨幽澗水懷胎須彌頂上無根樹不待春風已盡開僧問如何是誕生王子師曰橫身當宇宙曰如何是朝生王子師曰化外有權衡曰如何是末生王子師曰聲名清四海曰如何是化生王子師曰運用莫知名曰如何是內生王子師曰天下人瞻仰曰五位王子蒙師指不立功勳又若何師曰石女不梳籹受楚蒲請上堂拈疏曰一向天不收地不管且道者箇從甚處得來維那試剖露看宣疏訖師乃豎拄杖曰寬廓非外十方剎海冷沉沉寂寥非內無盡浮幢光灼灼出也片雲現於太虛住也孤鶴翹於松頂今乃蒲圻諸護法書幣遠臨既爾再四推免不下豈可更飾裒辭且直下承當普應群機一句又如何舉似卓杖曰是處是慈氏無門無善財結制上堂揚眉瞬目謾自周遮覿體當陽出衆相見僧問琉璃殿冷即不問如何是明月簾垂師曰百歲老人不展眉曰今朝結制還許學人搬柴運水否師曰頭頭無向背何更覓蹤由乃曰天無四壁地絶長垠以拂子畫曰也出者箇不得天地既出者箇不得則森羅萬象情與無情亦出不得乃至天人聖凡無有能出此者非但凡聖即者箇亦出者箇不得何也待伊觸破乾坤眼剔起眉毛腦後看上堂剎塵心數一串穿卻雕沙無鏤玉之功無量殊勝一槌打就結草乖道人之意破沙盆七平八滿殘羹餿飯得人憎三腳驢豎抹橫該明眼衲僧真笑具畢竟如何莫將間學解埋沒祖師心冬至上堂適來不見啓請突教特地升堂大衆濟濟簇簇嬴得一肚渺茫佛法了無文義那堪好肉剜瘡露柱燈籠啾啾唧唧時常接觜泥團土塊應時應節動地放光頂門重著楔一線已添長上堂二由一有一亦莫守一心不生萬法無咎驀拈拄杖曰三祖大師來也以無緣三昧一行三昧智印三昧將須彌移置芥子孔見諸人不會化作奮迅三昧走入露柱裏去也卓拄杖下座解制上堂頭頭解脫本天真物物威音劫外春法法誕生王子父塵塵無位好真人舉拂子曰見說生根了也且道誕生王子父與無位真人是一是二於此明得則釋迦打失眼睛一切有心齊成佛道稍涉見聞未免郢書燕說去也以拂子擊香臺下座蒙山以默禪德請上堂酷暑炎空人間若甑新豐坐禪蒙山打供無陰陽地放曠逍遙絶思惟處渾忘滲漏說佛說祖眼裏添沙舉古舉今鉢盂安柄且作麼生是不涉夤緣一句火雲騰碧漢朱夏已方深大士開光上堂換卻舊時面貌特地光新瞥然今日輝煌無邊瑞彩耳中見得塵塵皆是正法明眼裏聞來剎剎無非觀自在圓通門大啓法界絶遮攔善財參遍面面無私龍女寶珠時時突現既然如是為什麼今日重新特地以拂子點曰從教心眼洞然開普應群生機合感伽藍開光上堂肘後符摧邪輔正也是者段光明頂門眼洞徹十方也是者段光明在靈山親聞正法承記承囑者段光明初不曾增在東土遍鎮叢林為瑞為祥者段光明亦不曾減因甚更要山僧於斯開顯以拂子向空點兩點曰雖然本具光明藏往古來今不自彰結制上堂橫按拄杖曰十方智者皆入此宗直得山河大地明暗色空情與無情無一絲毫漏逗最初威音末後樓至歡喜無量彼我渾融與諸人同行同坐同起同止汝若未委山僧借伊鼻孔出氣去也卓杖曰參禪力敵大英雄莫坐明明白白中提起金剛般若利好教血濺梵天紅上堂僧問不立正遍堂不居獅子位此人還有施設也無師曰髮長不剪曰恁麼則新豐一滴水倒嶽與人看師曰搆不著乃曰風生大野木落空山霜花繡錦水面添章長連床上漢念念絶攀緣舉足下足鳥道無殊古木階前人心心證寂滅坐臥經行莫非玄路正恁麼時者一著落在甚麼處任從滄海變終不與君通上堂紅日階前冷霜風漏夜寒凍得烏龜成鱉粉碎大地泥團拈拄杖曰只有拄杖子天不諳地不曉也不管寒山睡重也不管斷臂安心挈挈波波烏烏律律提起也天魔膽落放下也帝釋魂驚且道具何三昧如是自在聻十二時中不知處通身都是黑漫漫解制上堂九旬禁制絶安排優鉢羅花不易栽今日頂門放一線一塵一剎一花開果能於此見處精明聞處透脫擎方外乾坤於一塵中馭掌中日月於大千界內城市深山逍遙無礙水邊林下長養聖胎秪如不涉結解一句又如何舉揚多謝蒲圻費居士不憚關山送供來四旬衆請上堂僧問如何是家裏事師曰不許外人知曰如何是日用事師曰觸著磕著曰如何是動中靜師曰無人證明師拈拄杖曰天地未分已前父母未生之先淨裸裸赤灑灑秪是者箇天地已分後父母已生來淨裸裸赤灑灑也是者箇到者裏分即是不分即是卓杖曰向者裏見得人人常光現前箇箇壁立萬仞秪如不居正位一句又作麼生放曠不耕空劫地行於異類且輪回先和尚十周上堂昔年把斷要津山不能青水不能緑今日全彰面目便見山如是青水如是緑可憐馳逐聲色人眼睛鼻孔都打失若欲知恩解報恩必待日午打三更遂下座至真前拈香曰苦如甘草石密良似砒霜毒藥雖是土宜聊且應箇時節便燒付玄輔弼西堂上堂提持衲僧巴鼻須是克家流通佛祖淵源貴乎眼正不待呼剎竿預知向上未曾入新豐已經罷參且道是誰顧西堂曰你看他昔侍先師於崆峒其切磋一一可法先師過後又經七載指體投機更非一也先師一箇未了公案只得纍及遂舉衣曰多子塔前原不了轉相授受到如今山僧兩手親分付五葉一花大地春堂乃接衣對衆曰降旗不豎方隅窄若豎降旗四海非借問衆兄弟秪如旌旗大展法令高宣當此之際豎則是不豎則是衆皆默然堂曰金簇慣調曾百戰鐵鞭多力恨無讎不如折弓解甲去也復問大庾嶺上提不起阿誰持向此山來師曰闍黎只顧承當曰恁麼則當陽展示大家看師曰衆生有賴遂搭衣曰九拜端施未審和尚受否受則於自宗乖不受則師資道隔乞賜一言永為定鑑師曰闍黎甚分明曰恁麼則敲開夜合千年秀奪轉新豐萬古春師曰卻是山僧本意誕日上堂雨洗長空歷落千峰翠色風流澗壑離披萬籟幽聲有眼者端的是見有耳者必定是聞秪如聲色未萌之際六根未兆之先且道諸人本命元辰與山僧本命元辰是同是別野色更無山隔斷天光直與水相連誕日請上堂鏡花水月三千界芥子彌盧百億天一箇本來虛幻面被人喚作四旬年秪如本來面目年紀多少疑殺黧奴白牯笑倒天下衲僧付主拂耀上座上堂金針玉線話會難通草偃風行隨機自在到者裏說正說偏說體說用說向上向下大似撮空花圖風影笑殺旁觀更謂三墮四禁亦何異止石女莫生兒且父子相傳一句又且如何天曉木人敲月戶夜深石女繡燈前住楚蒲圻玉崖山上方禪寺順治甲午四月八日師受請於五月十三日就蒲城延壽寺開堂拈疏曰弘闡少林直指言言玉轉珠回發明洞上真宗字字雷轟電激苟向毫端未舉以前見得略較些子設或未然仰煩維那宣過指法座曰盡大地是箇寶華王座無一人不與同行同坐因甚重新特地顧左右曰密移一步看飛龍拈香祝聖畢復拈香曰收來劫遠懷抱年深佛祖正眼不敢覷著天下衲僧瞻仰有分爇向爐中供養前住浙江湖州辨山龍華寺開山第一代傳達磨正宗第三十八世先師瑞白雪老和尚用酬法乳之恩斂衣就座上首白椎曰法筵龍象衆當觀第一義師曰金椎未舉遍十方淨裸裸無縫罅森羅萬象一印圓該無一際而不全體顯現寶磬才敲總浮幢赤灑灑絶回互草木昆蟲咸資其化無一塵而不獨露真常如春在花無一花而不春如月在水無一水而非月更說甚麼一義二義豎拂子曰正當恁麼時直下無私一句作麼生道釋迦不受然燈記樓閣門開待阿誰乃舉神鼎諲和尚開堂示衆曰山僧行腳也無正因只待向東京城裏聽一兩本經論於古寺閒房只恁過時不謂行到汝州葉縣被一陳業風吹到首山曲彔床上見箇老和尚當時把不住禮卻他三拜直至於今悔之不得後來圜悟勤和尚曰者老漢參到生鐵鑄就處窮到無絲毫解路時所以向鐵壁銀山斬釘截鐵若不知有向上宗乘怎解與麼道師曰圜悟只解把手上高山不惟土曠人稀直使三千大千作箇無孔鐵鎚山僧於崇禎年間因生死不明用盡伎倆走穿若干地皮尋到越州蕺山遇箇老和尚把斷路頭直得行不知行坐不知坐一旦打破漆桶死去十分蘇蘇醒來依舊眉橫眼上復被他揭卻腦蓋卸卻角馱拶得冤入骨髓懷之草有餘年今被諸公三番四度逼入者箇行戶不免變作箇披毛戴角沒巴鼻的大蟲向十字街頭揚聲大叫去也以拂子向空作點勢曰我不敢輕於汝等汝等皆當作佛上首結椎師便下座六月初九日入院山門基師曰無門解脫之門左右顧視曰還有信得及的麼拽杖便入佛殿釋迦已過去彌勒猶未來正當恁麼時新長老撒開坐具大展三拜也是冬行春令據室千人排門不如一人拔關一人拔關千人萬人得入遂卓杖一下便起即日請上堂指法座曰三乘十地只可飲氣吞聲文殊普賢總教排列下風新長老又如何施設拽拄杖便升拈香曰此一瓣香仰之彌高智可不知鑽之彌堅識不可識城中已曾剖露了也今承衆護法躬送入山更不重說偈言遂插香敷座維那白椎竟乃曰形興未質名起未名坐斷天下舌頭放開古今線道將人人腳跟下一著移至諸佛頂𩕳上用從教觸著磕著撞破虛空將諸佛頂𩕳上一機移至諸人腳跟下用總教舉足下足踏穿大地物我雙融通身富貴乾坤一體徹骨清涼正所謂法隨法行法幢隨處建立更說甚黃閣簾垂君臣道合苔生玉殿尊貴渾忘檢點將來猶是途路邊事秪如到家一句又作麼生揮拂子曰突兀高峰恆積翠淵源秀水遠流長僧問玉殿瓊樓即且置驢胎馬腹事如何師曰輕打我輕打我曰今日賓主當陽作麼生是上方家款師曰滿盤傾不出大地沒饑人曰人人知到上方月幾箇能遊劫外春師曰阿誰兩耳不垂肩復舉世尊一日因文殊在門外立世尊曰文殊文殊何不入門來文殊曰我不見一法在門外何以教我入門師曰世尊向平地上樹棘插籬分疆立界若不是文殊作家登時推倒界墻鋤平坎陷管教在門外立的至今入不得在門內坐的至今出不得爭似上方卻無許多疆界一片淨潔田地出入縱橫優游自在卻有一件奇特處且作麼生是奇特處師良久維那結椎師便下座上堂僧問黃閣簾垂紫羅帳合如何是退位明君底事師曰深宮寂寂漏更寒曰此時還有功勳可立麼師曰密室無人侍空階莫問程乃曰杲日臨空罩古籠今無點跡輕雲映火填溝塞壑絶囊藏處處流金爍石人人汗雨如湯世諦流布底三界無安猶如火宅途中受用底萬機不到脫體清涼陝府鐵牛面孔黑嘉州大象鼻頭長參上堂明明絶覆藏歷歷無向背法法不思議塵塵泯對待到此非但德山臨濟目瞪口呿即使文殊淨名徒只瞻仰有分擊拂子曰百千三昧毫端現萬斛珠璣掌上翻馬邑侯請上堂豁開頂門正眼風行草偃布真機捩轉向上牢關水到渠成閒自在體盡功忘隨流得妙所以道應以居士宰官身得度者即現居士宰官身而為說法今宰官身已現且道畢竟說甚麼法顧視左右曰一堂風冷淡千古意分明上堂苔生玉殿尊貴未忘古路悄然話會猶在縱使拈一機千機萬機頓赴如刻人糞作栴檀香舉一句千句萬句朝宗似持蠡殼量大海水到者裏格外超宗底正好朝三千暮八百若是抵死十分底未堪有棒分在舉如意曰道吾舞笏同人會石鞏張弓作者諳上堂夜半烏雞騰碧漢天明玉兔泛靈槎分明只是目前事又被分明兩眼遮大衆好教你知所以道田地穩密底起腳不得大力量人全提不起到者裏逞驢脣馬觜得麼胡言漢語得麼既總不得秪今人天交集又作麼生通信朔風不解揚家醜裂碎龜文大地看上堂今日隆冬初一四野冰霜歷歷文殊降大吉祥普賢分身百億可憐白象王遍界絶蹤蹟既是遍界因甚又無蹤跡驀揮拂子曰轉位就功忘影象回途復妙始為奇元旦上堂僧問新年頭佛法即不問如何是梅花一點真消息師曰泉石有情開古意曰臣退位朝君子轉身就父如何是奉重的事師曰室內不知春曰萬國醉心嘗大鼎相逢攜手上高臺師曰松筠何處不新機乃舉僧問鏡清新年頭還有佛法也無清曰有僧曰如何是新年頭佛法清曰元正啓祚萬物咸新僧曰謝師答話清曰山僧今日失利又僧問明教新年頭還有佛法也無教曰無僧曰年年是好年因甚卻無教曰張公喫酒李公醉僧曰老老大大龍頭蛇尾教曰山僧今日失利師曰二大老將諸佛最上一著子恁麼流布將去浪走天下衲僧殊無坐斷乾坤氣象今日有問上方新年頭佛法有無但向道蒲城紙貴一狀領過設有箇衲僧出來撫掌呵呵道盡謂春歸無覓處不知流入此中來拄杖子忍俊不禁連道三箇屈字何故上方今日失利上堂十五日已前天不收地不管走殺天下衲僧十五日已後雲不飛鳥不度坐斷死蛇鼻孔正當十五日風蕭蕭雨瑟瑟威音那畔敵體全該今世門頭眼橫鼻直且道在諸人分上又作麼生於此委得放身物外一任逍遙設或未委長連床上有粥有飯上堂正按傍提是弄猢猻家具一椎百拶徒教露柱心空放風前箭展末後機巧不如拙賊來便打客來須看眼不似眉若論佛法即使山僧口如懸河舌出廣長能錦上鋪花雪中送炭也不能舉著箇元字腳何故一任鑽龜打瓦從教塞壑填溝臘八上堂未出皇宮未登雪嶺好箇太平風景坐著則該三十棒何故往往墮衆生於無事甲裏及乎出皇宮登雪嶺凍不知寒饑不知餒一旦睹明星開夢眼雖則好事簡點將來亦不免三十棒何故不合惱亂衆生還有三十棒上方長老自喫要且不干大衆事拽拄杖便下座解制上堂僧問祖道重興古風高振學人上來請師一接師曰古殿無人侍空階莫往還曰慈雲遍覆法雨洪施為甚石女木童乾曝曝地師曰一天幽雨露萬里野風光曰恁麼則雪裏烏雞初破曉松間白鶴已翔空師曰好續鷓鴣詞乃曰攛掇鐵牛眠古井而神龍不鑑止水放教石女玩花燈老僧不在明白裏即饒天雨四花地搖六震現無量神通證無量三昧在曹溪路上只喚作鬼神茶飯秪如三月開爐九旬煆煉又且如何良久曰證龜成鱉雖常事笑煞廬陵米價新復舉南泉示衆曰昨夜三更文殊普賢二人相打各與二十棒趕出院去趙州出衆曰和尚棒教誰喫泉曰王老師過在甚麼處州便禮拜雲門曰深領和尚慈悲某甲歸衣鉢下得箇安樂師曰者夥賣私鹽漢只圖攙行奪市並不知王令稍嚴驀拈拄杖曰總被山僧一齊束在者裏未審諸人皮下還有血麼復卓一下上堂鶯囀花芳春正茂子規啼血聲聲喚癡狂遊子不歸家辜負本來光一段驀豎拂子召衆曰有眼者必見有耳者必聞既見且聞作麼生是家復擊曰內離見聞覺知外除聲色香觸又喚甚麼作本來光良久曰莫言世事多荊棘客路由來不可行縣歸上堂出山剛九日曆本去半截光陰迅速流那事如杲日殷勤為照古菱花贏得兩眼黑似漆洞山不許誕生王臨濟未是白拈賊還有證得的麼便下座金唐專使至上堂達磨不來此土消息杳然已成狼藉不少洞山過到玉崖全無巴鼻因甚被金唐長老覷破夜半木人敲月戶天明石女繡花冠分明雖是目前事結制并祈嗣上堂僧問匹馬單鎗氣格雄牢關踏碎幾千重今朝再入龍蛇陳權請吾師一句通師曰你何平地喫交曰露柱懷胎石女産兒又且如何師曰威音前一箭射透萬重關曰垂鉤四海只釣獰龍假饒眼蓋乾坤的漢到來還堪種草也無師曰三生六十劫曰戴角蟭螟吞白額無毛鐵鷂産金龍師曰間話會乃曰混之不得類難齊凡聖空爭是與非摩蕩乾坤渾不曉懷胎萬物許誰知雪山六載的不異捕風捉月嵩山九年的喚作飲氣吞聲縱使三藏十二部漸說頓說廣說喻說只可讚揚得他天下老和尚正按傍提左敲右唱只可依傍得他後代兒孫知見狹劣逐管長期短期縱修證得無量勝身種種三昧只喚作熏染得他還委悉麼把定乾坤策起眉拽將北斗面南窺直待懷胎傾落地始信區區得意奇冬至上堂節屆書雲一陽來復向上一機填溝塞壑諸佛舌頭短也不說衲僧巴鼻長也不說放行一句又作麼生不說不說上堂朔氣漫漫凍龜成鱉霜風歷歷石人淚血前釋迦後彌勒直得腦門著地柏樹子麻三斤依舊全提不起畢竟如何雞寒上樹鴨寒下水上堂黑白兩忘開佛眼豎拄杖曰瞎不繫一法出蓮叢卓拄杖曰是菡萏是荷葉真空不壞靈智性復卓曰馨香滿道途妙用恆常無作功以拄杖左右展曰東拋西擲有甚過遂呈起拄杖曰大衆你看者老萬回三百六十黃金鎖子骨被木上座一串穿來總在者裏會得同途受用不會塞壑填溝復卓一下上堂仲冬初一霜風壁立刺破面門阿誰委悉設有道莫壓良為賤好山僧且款款道記打三十上堂寒風不改東暘色朔氣常芬太古心潑面潑頭人不委狂歌辜我劫初吟拈拂子打圓相曰還有人向此回避得麼可中有箇眼蓋乾坤而不自覺胸騰日月而不自明與諸人坐即同坐行即同行若能檢點得出即使長河酥酪大地黃金為供養亦皆消得設或未然莫言開口不干舌剛道無心便有心谷山金峰和尚訃至上堂師展金峰所寄扇曰憶兄一聚首積習染成痾嘗有徑寸璧恨無魚鴈過獨憐槐夢影空嘆魯陽戈末後風流甚巴歌乞一和大衆此是谷山法兄去年十二月朔四日手澤也抵暮涅槃時復書偈曰莫怪修行不妙病來撒屎撒尿有人嗅著些兒跳出三界關要跳出後如何老鼠弄金鎚大蟲戴紙帽你看者箇阿師生平慣把烏豆換人眼睛及至末梢頭猶將鐵蒺藜橫拋世界只如巴歌又作麼生和遂揮扇曰今日熱於昨日上堂舉洞山初禪師參雲門門問近離甚處山曰查渡門曰夏在甚處山曰湖南報慈門曰幾時離彼山曰八月二十五門曰放你三顛棒山明日問訊昨蒙和尚放三頓棒不知過在甚麼處門曰飯袋子江西湖南便恁麼去山於言下大悟師曰雲門探竿太深洞山影草甚密可惜不知來路若是箇漢見他道放你三頓棒便好倒身三拜而出管教他疑殺行腳人那堪明日更納敗關致使古今人笑雲門有把關據要之鍵而無鞠訊考盤之威雖則不言汗馬功高爭見重論蓋代也只成得太平姦猾所以雪竇拈曰雲門當時若據令而行子孫未到斷絶雖然如是莫將鶴唳誤作鶯啼秪今要見雲門麼拍左膝曰者裏是要見洞山麼拍右膝曰者裏是且道上方畢竟在那一頭為人拈拄杖曰者箇喚作棒入地獄如箭射一齊趁散歸方丈上堂萬機截斷迥絶羅籠一句全提了無湊泊金針玉線敲唱雙行織成錦繡鴛鴦主賓互換投刃揮斤蹴踏金毛獅子千錢不賣五百便賒驢揀濕處尿還有知恁麼事底麼卓拄杖曰黃河三千年一度清謝孝廉就涌蓮菴請上堂舉如意曰還委悉麼應眼時若千日萬象不能逃影質凡夫只是未曾觀何得自輕而退屈應耳時若幽谷大小音聲無不足十方鐘鼓一齊鳴靈光任運常相續到者裏喚作古今得麼喚作見聞得麼既總不如是秪今覿面無私又作麼生擊如意曰月似彎弓少雨多風便下座過黃龍值師誕日覺空老宿請上堂僧問如何是黃龍第一關師曰日論當午照不許太陽紅曰如何是第二關師曰不許夜行剛把火直須當道與人看曰如何是第三關師曰路逢死蛇莫打殺無底籃子盛將歸曰三關已蒙師指示未透三關是若何師打曰且居門外問飛錫崇恩即不問獨坐黃龍事若何師曰遍界牟尼無朕跡撲碎當陽照古今曰還有出頭分麼師曰天上天下惟我獨尊乃曰法運寥寥數百年且無消息妄流傳金烏玉兔穿梭急大道何嘗有間然作麼生是無間然底大道聻以拄杖向空畫曰於此會得則知古之日月長空即今之長空日月復畫曰於此會得便知慧南老子所立三關的旨趣過得三關始知古洞山的本命元辰落處知得山僧本命元辰即悟得各各當人二六時中折旋俯仰一動一靜的落處悟得自家落處即識得從上四十八代祖師的面目在處知得祖師面目便信得古之日月長空即今之長空日月無間無斷如是將大地作黃金攪長河為酥酪而作祝儀山僧只好隨例投餐卓拄杖曰還委悉麼不聽虛空閒饒舌那許枯樁打葛藤費不二居士請就聽默菴上堂山上重山青翠中是箇什麼水中復水靈源裏更有何源蛟龍起舞造物神藏凡聖交遊煙霞出沒此中有一句子寒暑迭遷而莫侵人天交會而靡窮又作麼生體悉拂一拂曰雲開嶽頂高低岫雨過潭清上下天上堂天地之前徑時人莫強移箇中生解會眼上更安眉諸佛菩薩錯七錯八泥豬癩狗留五添三信則龍女頓成佛不信善星生陷墜秪如不涉迷悟凡聖又作麼生瓊樹瓊枝皆是寶栴檀薝蔔一般香開爐上堂萬世一時古今絶跡人人壁立真風箇箇揭開正眼邇來佛法傷殘人心狹陋粘皮著骨底未免論性論心三搭不回底依舊說理說事墮愛見坑沉癡惑網殊不知西天老胡十萬里來秖要自悟自證各各圓滿爭奈根本不真伶俜客作數他珍寶未免輪回今此蓴川百千年來見性圓宗罕有建立幸蒙諸檀悲願延請山僧興揚正法開鑿人天用報皇恩萬靈啓悟秪今法會斯隆畢竟功歸何所良久曰九天雲散盡紅日照龍樓黃白峰偕男山旭請上堂天人群生類深心之所欲更以異方便助顯第一義驀拈拄杖曰者是異方便那箇是第一義良久曰寧可截舌不犯國諱復舉龐公參石頭問不與萬法為侶者是什麼人頭以手掩其口公有省復參馬大師亦如是問大師曰待汝一口吸盡西江水即向汝道公深領玄旨師曰二老答話可謂頭正尾正惜乎當時輕便放過致令天下不奈伊何若問上方不與萬法為侶者是什麼人但向道此去西天十萬程還有知落處底麼昔年一口吸西江千古風高羡老龐今日蓴川濟濟士偶然一箇便成雙冬至上堂冬至一陽生拈拄杖曰且道者箇生多少聻良久曰春風不道珠簾隔傳得歌聲與客心卓拄杖下座解制上堂僧問德山用棒臨濟用喝總是撒土撒沙如何是直截根源的事師曰有人笑你敗闕曰靈山話月曹溪指月無非畫影圖形作麼生是真實為人句師曰侵凌雪色還萱草漏泄春光有柳條乃曰十方世界渾無物正體堂堂沒卻身者裏不許情識計測不容玄要商量直饒萬里青天正好喫棒十成底蘊急須吐卻向諸佛行不到處行取一步祖師開口不得處瞥轉一機則見燈籠與露柱交參佛殿共山門鬥額更說甚麼長期短期安禪靜慮遂豎拂子曰且道在者箇分上成得什麼邊事一滴水成一滴凍一花開放一枝春師誕日上堂以拂子向虛空畫曰只者箇謂之頂王三昧智印三昧不動不變無古無今即山僧在四十四年以前光景自住昔不從今以至昔在今四十四歲以後光景自住今不從昔以至今正當今日凡聖交參賓主協會其間求同異相了不可得秖如眼眼相覷又且如何通信復畫曰也不免借渠鼻孔出氣去也擊拂子下座上堂一句全提千差合轍一機圓現萬法皆如卓拄杖曰者箇是第二句且道那是第一句不見古德道具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即同凡夫凡夫若知即是聖人喚作第一句得麼擲拄杖曰鐵樹花開別樣紅謝紫山護法之任請上堂語默不得觸背皆非蘊六合以無外鏡萬象而有餘且道是箇甚麼遂擊拂子曰此是紫山居士從京師持來冀藉此與諸人結般若緣山僧豈肯囊藏於今明明拈出還會麼聽取一偈三根椽下休擬議七尺單前莫放鬆一旦疑團撲碎了呵呵笑倒紫山翁圓顱請上堂真機不掩千峰突兀萬緣坐斷廓爾無依說甚剷草堂前雙彰體用所以寸草不生不異體臭布衫全體皆如正是炙脂帽子秖如二俱不涉又如何指示不住舊時無相貌外尋知識總非真結夏上堂結夏安禪叢林成範護生禁足至聖弘規以大圓覺為伽藍身心安居平等性智直得森羅萬象情與無情向者裏一時總結進一步撞碎釋迦腦門退一步坐斷達麼脊骨不進不退鈍鳥棲蘆秖如行不越戶坐不當堂的人畢竟如何安置良久曰端坐受供養施主常安樂仲夏上堂農家久困焦勞倏然匝地甘雨祖師巴鼻掩禁不住直得倒嶽傾湫填山塞土擔板衲僧收拾不得只好一齊分付田主何故從教萬古漫漫一任村歌社舞解夏上堂金風扇野明明空劫已前玉露浮空歷歷威音那畔聞聲見色如石上栽花履逆逢危似風中鼓橐瞥爾轉自己為山河國土草木叢林盡作師子吼放開一線轉山河國土為自己塵毛芥孔一一現百億身還有恁般人麼撫几曰未曾跨過黃金限且向門前宿草菴辨山瑞老和尚忌日上堂拈香曰巴陵為雲門作忌設三轉語義出豐年洞山為雲巖作忌半肯半不肯儉生不孝上方今日設忌任教塞壑填溝何故更闌休著錦日午不挑燈楚城歸上堂舉古德曰去時炎暑侵衣熱歸日秋風滿面涼彈指聲中便差別百年能得幾何長緣生之旨理合如是秖如山僧每欲轉浙每不果念昨方扺省又不果行一十五年中忘卻來時路從教佛殿對山門任使僧堂傍廚庫正恁麼時作麼生是法住法位一句良久曰刻舟求劍覓瘢痕往往不翅河沙數重九衆護法請登雪峰上堂大象無形大音希聲真機滿目耳不可聽到者裏非但未登雪峰毛孔卓豎即使親履霜空膚湊皆明者耳不觀色眼不聽聲總須茫然且看他山川聳秀景物呈祥冉冉白雲墜長天之玉嬌嬌黃菊灑遍地之金直得森羅煥彩萬象騰輝且六爻初未動一畫已成偏又作麼生話會毗耶不離方丈室大千國土掌中擎須彌昨夜熾然說報道眉毛頷下生諸公各各摸取好禳病請上堂解脫真如佛乘藥凡情聖解衆生病病退藥除心跡忘塵毛芥孔同圓鏡且道同後如何磉墩有花開鉢盂不安柄丁酉六月退院上堂三載玉崖隆祖道疲力竭病神魔侵奉違一衆歸巖穴不厭重雲萬疊深所以道二儀未兆本絶自他一易才生難忘彼此未有常行而不住未有常住而不行秖如退後又作何行履那邊不坐空王殿爭肯耘田向日輪回古洞山送玄輔首座進方丈上堂佛以一音演說法衆生隨髏各得解且道是那一音遂橫杖作吹勢曰聞麼諸佛以此一音悲度恆沙盡衆生界不能化導無緣只成得半音本寺價祖首創茲山大闡宗風廣弘萬品而不能使中道不衰也只成得半音山僧謬忝芳繩繼斯中業重啓此音一十三載破陳業風吹過玉崖未圓厥盛亦只成得半音今幸弼公首座行解雙圓四衆咸服山僧委命主席大啓洪規重新繼起過正當山衆請上堂春光明媚景初融草木叢林展笑容除卻古今光一道更無他處話玄宗急著眼漫從容但自橫身當宇宙從教無地不春風還有共相證明者麼僧問和尚謝事古洞退席匡峰養道深居一句作麼生指示師曰自古青山不畫眉曰如何是千尋月照匡廬頂師曰家家門掩蟾蜍窟曰如何是萬疊雲封彭蠡城師曰處處鶯啼楊柳風僧擬議師曰請君惟自得不必更如何師退住匡山凌霄巖受湖州辨山龍華寺請上堂拈疏曰十字街頭才已罷釣孤峰頂上始慶安眠因甚又被者箇牽引不見道鳳林吒之升座曰犁耙才脫入山來又辱飛書遠見催大抵業緣無避處從教異類且輪回山僧今日通身是手措置不及通身是口分疏不下聊借拂子威光放開線徑去也遂豎拂曰大衆你看辨嶽峰與五老峰不動本際在拂子頭上交光相羅各挺無邊妙相太湖與鄱陽湖一鑑無私圓融無際共轉無盡法輪普令見聞圓成金剛種智如斯奇特畢竟功歸何所拂拂曰林泉處處添新象廊廟頭頭識故人
