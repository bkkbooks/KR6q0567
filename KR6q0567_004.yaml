body:
  text: 嗣法門人智祥編住澧州藥山慈雲禪寺己酉十月初四日入院拈香祝聖畢又拈香曰不假雨露栽培寧受雲霞馥郁靈根永固氣味氤氳供養本寺開山弘道儼祖大和尚惟冀悲乘不倦應化無方懷中復拈出香曰名之不得類亦難齊幾擬塞壑填溝又被業風吹轉第六回拈出供養浙江湖州府辨山龍華開山第一代傳達磨正宗第三十八世上瑞下白入就先師雪和尚遂敷座問話且止問法不知宗趣縱饒問去答來徒增戲論你看六祖在五祖會中腰石碓米夜半傳衣說些甚麼苟知問在答處答在問宗便知石頭遷祖達書回於青原思祖處得箇鈯斧子住山旨趣知得鈯斧子旨趣便知儼祖在石頭會下一切不為千聖不識的宗猷信知此事不向言中取則亦非句下流通一踏到底的說甚臨濟三玄七事影草隨身洞宗五位功勳三種滲漏到者裏不妨八字打開一機吐露去也且道祖席重輝開堂祝聖一句又作麼生只憑不老長程願祝讚當今有道人到虔明請上堂真風壁立自古不磨祖令當行條然有據是以闢蒿萊崇像設翻瓦礫成禪居已有其人而況嶽陽樓畔一尋煙水仙子去來無恙洞庭湖岸萬井人家雲霞出沒無依若教老漢向這裏拋砂撒土更是無端便下座過梁山洞泉掃觀祖塔上堂林巒聳秀古佛家風澗壑幽清道人活計觀祖向這裏踞穩密田地展格外機輪袈裟角下直釣獰龍拈風前箭筈無相道場羅籠威鳳世遠人湮清風冷落幸而鼎公堂頭繼此芳躅重開生面山僧自雲巖赴藥嶠躬入塔前掃灑瞻敬正恁麼時有箇金刀劈不開的句子良久曰委麼設或未委可同到塔前為汝諸人說破至塔前新豐一曲至老祖碩德弘慈唱彌高千百年來道曠無涯和彌寡際今重光祖席可謂節拍相湊不肖淨瑩上承祖廕忝為三十世孫鏤骨銘衷躬展瓣香少傾毫末悲懷滿眼四顧倣徨更不敢重說偈言遂上香過德山掃鑑祖塔上堂緑竹蒼松布老祖利齒銀牙落澗濤聲式老祖海口航舌敲風打雨寂歷無私夜暗晝明亙然靡間是以千百年古碑重現生氣凜然猶有妄物鑿去碑中宗派法系十餘字然雖修羅嫉生障翳而亦不礙日月光華況大藏小藏鐵案炳星而天道人道昭昭共鑑不肖淨瑩躬詣塔上展一瓣香奠一杯茗非敢謂雪屈酬恩抑且自傾忱格正恁麼時如何是老祖不動本際說法無量的事舉香云只憑古銘元文案僧史無煩更董狐結制上堂法運寥然數百年草深不止法堂前於今重把新條令直透威音那畔先所以道向上宗乘真風壁立縱是雪山苦行六年虛耽歲月嵩山面壁九載飲氣吞聲即使二祖神光三拜也是泥裏洗土以至遞代繁興不過因行掉臂老僧到這裏曲順時宜開爐設韝或有箇銅頭鐵額的出來掀翻法座喝散大衆拽下老僧驀口𡎺去稍知向往但問伊且作生是向上宗猷擬議不來朝三千暮八百未有了日開山儼祖忌上堂召衆云還知麼此我開山老祖全提正令為大地含生轉大法輪的時節至今風凄凄日杲杲豎拂子云幸然鼻孔落在山僧手裏今將老祖鼻孔穿卻大衆鼻孔也在我將大衆鼻孔穿卻老祖鼻孔也在我稍或遲疑可隨到老祖座前酌水獻花各各驗取便下座謝義山且拙和尚專使上堂山僧自到藥山懶得挑灰撥火一味獨行獨坐風靜雲閒或披雲臺畔遊行或祖塔衝散步猿吟鳥噪不知南北東西葉落花開那管冬春秋夏宴眠早起渾忘所自不期義山一光東射來到此間直得朗山岌崿澧水騰波驚動幾多飛潛走躍不知所措義山和尚以大神通不思議法力向香積佛國移得諸佛大悲所熏甘露法食來此堂中作大佛事祗如教中云其施汝者不名福田生心受施墮三惡道又作麼生拈起拄杖曰今請衆下一轉語以謝供養有麼有麼如無拄杖子自道去也擲拄杖下座元旦上堂元正啓祚萬象維新祝一人之聖壽地久天長兆萬法之資始民豐物阜而況彤雲布彩祥光亙彌宇宙奇花墜玉瑞氣湧塞乾坤是以披雲臺畔風規凜凜嘯月峰頭華雨濛濛正恁麼時大地無痕而孤峰不露一句又作麼生道良久曰至化無為亡朕兆崔嵬終不落今時解制上堂把斷要津百日身心忘內外放開線徑十州芳草漸蒙茸直是絶情離見須知泮古融今所以道迷時三界有悟後十方空了得些兒趣方堪話祖宗遂拍案云到者裏直得八字打聞十方通暢道箇結也該三十棒說箇解亦該三十棒何故太平不解成家計野老相將笑轉親師至古天皇寺衆請上堂天皇古剎唐代開山自悟祖建宗立旨而龍潭續焰傳芳磨不磷涅不緇賣餅餽餅天皇寺巷剪不開截不斷師資道合一段因緣千百年來真風不掩恆沙界德遍洽無涯有一種移嶽盈壑截鳧續鶴者盜王氏之青氈以為己物認嶺南之孔雀而作家禽豈知智眼區別笑破口唇山僧特因瞻禮祖塔道過古荊導孫領衆居士敦請老僧舉揚悟祖所建的宗旨還有具眼者麼卓拄杖云珍重懵懂休妄擬莫將有限趁無窮到常德棲賢禪寺請上堂乍離巖穴出幽山野水平渠足可跚一箇全機沒巴鼻潑頭潑面絶遮攔驀豎拂云苟向者裏見得即可不離途中渾居家舍而況維新法社大道弘揚闡舊家聲渾輪向上直得阡陌萬家之煙灶朗播真風澬江一帶之清流彌綸皎月漁火清燈熾然靡間樵歌牧唱韻出青霄你看者一坐具地不止填溝塞壑還有威音具眼旨外明宗的麼良久擊拂云剖出無瑕方是玉畫成有足即非蛇佛誕日退院命櫟山首座主席上堂法席寥寥數百年歸來泉石尚依然幸當折腳鐺無恙提挈維勷在後賢諸昆仲者箇鐺子含育四生胚胎萬有貴則傾國不換賤則不值分文比來兵戈亂後土曠人稀山僧謬繼芳繩蓋因初住雲巖未曾交付每承寧州護法催書疊至事不由己今此折鐺家計不可一日無主賴有願公首座堪能紹述風規命居吾室登此座行此令開拓人天不負最初請意雖然從上來有箇金刀剪不開的句子極力提持不能相似少間待請新方丈出來為諸人別通消息義山且拙和尚至引座藥山門戶亙古無私儼祖真宗彌然罔間數百年風規寢削法堂不止草深剎那際擬壯舊觀瓶盂將堪駢集無奈含識中有一等病在五蘊鑑覺者聞不出聲見不超色病在素無主宰者為物所轉流浪前塵病在勝境限量者背卻法身病在解脫深坑者沉情滯境乃至病顛病狂病增上慢如是種種莫堪醫冶茲我義山且兄真大醫王象駕光臨此是諸人莫大因緣不出戶庭而得參知識不移跬步而涉歷大方可謂千生一遇萬劫難逢急整殷勤懇施法藥庚戌五月師自藥山復回雲巖上堂僧問茫茫煙水始隨芳草去疊疊雲山又逐落花回不動本際一句作麼生師曰只恐無人識曰有一人常在途中因甚不離家舍師曰舌頭短三寸曰有一人常在家舍因甚不離途中師曰眉毛長丈二曰那一人合受人天供養師曰三十棒且待別時乃曰去年八月藥山去今朝小暑藥山回來去了然亡朕跡箇中誰許亂安排所以道心非我生金石流而不焦象非我出八極渾而無礙到者裏若說藥山即雲巖雲巖即藥山不得若說藥山自藥山雲巖自雲巖亦不得且作麼生是不傷物義一句漫遊花下路密室不知春衆護法請上堂向上宗乘十方絶唱機輪轉處作者猶迷到者裡縱使孔聖竭盡家珍致令天地位萬物育亦莫濟其少分山僧放開線道使聞見分明不妨風塵日色各顯圓宗竹籟松濤咸成梵響幸我雲巖一班護法信知的有此事請山僧舉揚以滋物化正恁麼時擊節一句作麼生道泥牛吼處天關轉木馬嘶時地軸搖庚戌六月初六受浙江紹興府諸護法同門請住雲門顯聖寺上堂師拈疏曰天人獻花無路鬼神潛覷無門且道者箇甚處得來即遞疏宣畢升座曰歸副雲巖望方然謝藥山何期石傘月炯炯照人寰雲門顯聖吾祖家山遠承法兄暨諸護法敦延山僧繼席奈雲巖殘局尚未克圓家庭重命義不敢辭只得借拂子威光放開線徑使若耶溪與修江水派派同流金龜塔與秦望峰青青一色正恁麼時如何是隨緣赴感一句赤水玄珠須罔象長江明月任東西僧問老祖家山千秋不改鑑湖風月萬古如新只如正中不立偏處不逢的人向甚麼處相見師曰須彌頭倒卓不見太陽紅曰恁麼則同時不相識千里卻同風師曰三千里外知端的曰一句迥超言象外松蘿豈與月輪齊師曰恰好做西堂冰谷大師請上堂青山不自青緑水不自緑萬化有為間渾身不覺露殷勤自照古菱花百億分身還可矚豎拂子曰委得麼舉世但知金玉貴等閒落眼便成塵夢帆大師領闔邑護法製詩讚法被請上堂千機不到處佛眼不能窺萬化不該時言論難聞口到者裡縱是無極無為猶坐功勛生即無生仍成變易又怎知剎那三昧壽量無窮大用繁興渾融化育一讚一詠鏗音落落一針一線綿縫重重還有向此中著得一隻眼的麼僧問聖降祥麟兆風和香正薰碧桃花爛熳高祝劫前春如何是劫前一句師曰須彌頂上不擊金鐘曰南山翠竹棲靈鳳東海清波現巨鰲師曰猶是一聯詩玉菴大師請上堂乾坤之內宇宙之間中有一寶祕在形山幾多人向五蘊根身裏作活計差矣擊拂子曰這裏見得如貧女獲寰中寶藏取之無竭受用莫窮稍或躊躇如力士失額上之珠徒增勞悶還有入林不動草入水不動波獲得此寶者麼僧問金鼎天然供越山篆文八卦體中圓空王拈出栴檀爇兩處祥雲結瑞煙者還是神通供養還是法爾如然師曰你只管疑著默也大師請上堂色裏青黃夢裡身了然無物可當情無端瞥爾成悲智或為主也或為賓其為主也眉撐有界足極風輪縱使大悲千眼莫可睥睨少分其為賓也溪山岌岌雲月重重和為萬物春風無往而非者漢放身命處大衆還委麼眨上眉毛休錯過莫將有限逞無窮辨山且和尚專使慶誕請上堂雨洗千峰秀色風沉萬壑幽涼煙巒由之聳翠水面以致添章且道是何佳慶者是我辨山且兄和尚一光東射更有個三藏莫詮千靈罔測的渾俞句子特專凜山法姪賚到者裡與大衆結廣大法緣作廣大佛事不期被虛空藏失手觸向爛泥裏跌得粉碎卻化作無量無邊虛空藏一時遍界分身去也若信得及少間齊堂裏與辨山和尚相見設或未然再扣我辨山西堂嚴姪僧問向上宗乘已屬雲巖剩語百千三昧原為辨嶺糠秕今日和尚特地升堂更為何事師曰遠意難忘曰者還是花石軒中意還是雲巖寺裡機師曰你不妨伶俐曰今承辨山法叔壽圖遠致文彩全彰已識二老人眉毛撕結只如壽圖未作時和尚與法叔如何相見師曰修江月是苕溪月曰子期不是閒相識流水高山意盡知師曰惹得虛空笑不休櫟山大師請上堂威音未兆機輪轉處彌彰這畔無為大用繁興絶朕縱是棒如雨點喝似雷轟也總不出箇旱地蓮花所以道袖裏金椎眉間寶劍須是恁麼人方知恁麼事若說向上向下反落言詮全提半提轉增露布那堪論他寶掌千齡甲子七百雖然當陽突出人難辨自有通方暗點頭懷嵩大師請上堂陽焰翻波六十年空花鏡像兩悠然相逢問我循途事甲子難論到那邊有一等人不知著落逐管引曹山謂父母所生口終不向子道若恁麼喚作按圖索驥豈知我祖宗門戶不見道靈鵲不棲無影樹澄潭豈墜於蒼龍還識懷嵩賢子的來意麼禪客相逢只彈指此心能有幾人知退院命梁山鼎首座繼席上堂十載於茲營祖道形骸土木血心枯只緣重纍難輕卸作過牛兮又作驢還有同伴相憐的麼凜山法姪問退雲巖而赴雲門途中得力句子願欲樂聞師曰只好分付老僧曰靈山一會儼然師曰闍黎也須擔取一半曰莫帶纍兒孫好師曰珍重去乃曰老僧前歲自藥山回切因連年土木心血耗枯兼以衰景漸臨世念如淋過死灰一般無有一點生氣不知身未入院而雲門祖席書幣遠臨再四躊躇既當孝子慈孫鏤骨殞身義不可辭況亦老祖有云不奉非孝不順非輔不敢違也然則極力擔當孝輔兩字只可領得一半那一半分付繼席堂頭少間剖悉
