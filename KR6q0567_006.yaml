body:
  text: 嗣法門人智祥編示衆結制示衆常規十五開爐新豈草一結制只道換古移今依舊眼橫鼻直如何是不變不移的事拈卻門前大案山除夕示衆拈起拂子説兩句話你便作佛法商量不拈起拂子説兩句話你便作世諦流布總不如合取者兩片皮免得共相纍及道了以手摑口曰猶自口喃喃中秋示衆人間八月中秋天上一輪皎潔彌勒布袋解開百億山河漏泄文殊普賢不敢抬眸明眼衲僧一生受屈豎拂子曰者箇也是第二月且那箇是第一月放下拂子曰擲卻夜合山大家齊證入遂喝一喝僧問中秋明月即不問逆流橋下事如何師曰通霄寂寂曰秪如鉢盂峰頂浪滔天又作麼生師曰非汝境界示衆今朝剛一七那事瞥不瞥抵暮不知歸回頭日又出驀拈拄杖曰看看復曰可惜許示衆碧眼胡十萬里來山遙水遠黃面漢三千年去地老天荒祖父田園皎如白晝迦葉剎竿凜若秋霜眼裏有筋底一撥便轉獅兒哮吼吒沙皮下無血的三搭不回一任伶俜辛苦山僧七八年來住此新豐晏眠早起只恁麼過時其餘是什麼碗脫丘雲隱老宿七旬請示衆年躋七十攪海龜毛長百尺境入從心擎空兔角闊千尋直得日篩麗水之金雨洗南山之碧山僧縱有千手萬眼也不能另布一籌以增其算只好引趙州老人作箇證明遂高聲曰喫茶去雪日示衆漫天漫地紛紛雪滿耳滿眼尋不得可憐長連床上人剔起眉毛無處説既是滿耳滿眼因甚無處説不見道才有一絲頭便有一絲頭喝一喝示衆惺惺寂寂是無記寂寂非寂寂惺惺是亂想惺惺非大小永嘉好一片寂照雙流綿密工夫只在是非窠臼裏要且出身不得爭似新豐一箇個如龍似虎任運騰騰汲水搬柴騰騰任運堂外三昧堂內不知堂內三昧堂外不知大衆三昧山僧不知山僧三昧拄杖子不知拄杖子三昧乃至窮有性盡衆生界不知既彼彼不相知秪今眼眼相覷底又作麼生寒山逢拾得撫掌笑欣欣示衆清泉白石山中有市中有兔角龜毛地下無天上無可惜道人行樂處趙州東壁挂葫蘆試問諸人葫蘆裏盛底是箇什麼不可作佛法商量亦不可作世諦流布參開普同塔基示衆萬物有形終歸磨滅真常獨照何處埋藏斫開荊棘林要顯法身常住且開基展土一句作麼生道以拄杖卓地三下曰金鋤才一動靈苗遍界生示衆學者先須識自宗須知揚眉瞬目語言動靜不是自宗山河大地明暗色空不是自宗有為無為學與無學不是自宗乃至禪道佛法玄妙理性不是自宗還會麼有會得的對衆證據僧問作麼生是自宗師曰禿卻我舌曰莫將真際雜頑空如何是真際師曰甚處去來曰如何是妙明體盡知傷觸師曰一點瞞不得曰如何是力在逢緣不借中師曰兩手贈君無一物曰如何是出語直教燒不著師曰搓不圓跌不碎曰如何是潛行須與古人同師曰我不如你曰如何是無身有事超岐路師曰明星當午照曰如何是無事無身落始終師曰河乾水又枯示衆衆兄弟洞山種田博飯喫論實不論虛出家兒圓頂方袍既名佛子必須心期至道以求妙悟慶快平生始不謂之虛度光陰孤負己靈如其懨懨蹇蹇淈淈𣸩𣸩空過一生三界茫茫沉淪無際有何所補不見先價祖問僧曰世界何物最苦曰地獄最苦祖曰不然向此衣線下不明大事是名最苦誠哉是言山僧曾有偈曰世間萬物最靈人極苦三途未足論向此袈裟如昧去難將譬喻較酸辛諸禪德趁色力強健衣線下事的的討取箇分曉一朝觸破疑團便是出三界二十五有底階徑那時方知若佛若祖鼻孔元只一箇臘月三十夜有自由分雖然猶是為初心曲順時宜若約衲僧行履敢道未夢見他汗臭氣在時光奄忽大非容易各自努力珍重示衆供養三世諸佛不如供養個無心道人喫飯咬著砂走路踏著地作麼生是無心所以道未到無心須要到到得無心心也休且作麼生是諸人底心良久曰切忌向長連床床上撞破露柱底額頭示衆進道嚴身三不足新豐脫也無機軸有米喫飯無米便粥左右逢源山青水緑不將佛法挂人唇觸境風光咸矚目且道奇特在甚麼處參除夕示衆霜重風嚴是處山沉水肅年窮歲盡洞然雪練冰交眼裏著得須彌山底敢保一絲也著不得胸中不挂元字腳底不妨洶湧波濤了知法法無多子觸境逢緣事事周秪如截斷衆流逢緣不借一句又作麼生收起殘年舊曆日來朝別自有新條示衆天將欲雪不雪普令大地風寒自是神光斷臂更無人覓心安設有個漢道從門入者不是家珍又作麼生山僧向道少壯不努力老大空惆悵示衆釋迦老子説法開了口至今合不得達磨大師面壁合了口至今開不得山僧新豐九載有個隨家豐儉句一向不曾舉似今日特為拈出盡力作伎倆只是跳他二老圈繢不出因甚如此雪峰道的示衆頂門正眼妙逢作者知機肘後靈符貴在英雄提掇若是拋三放兩誤賺後昆縱去奪來恥他先匠所謂言前定旨特地乖宗句下承當迷封萬里還有知恁麼事的麼出頭天外看誰是我般人示衆舉先價祖曰向前物物上求通秪為從前不悟宗如今悟了渾無事方知萬法本來同長者長法身短者短法身鴉作鴉鳴鵲作鵲噪作麼生是同底道理柴要搬水要運米要生春飯要熟煮作麼生是無事底道理雲從龍風從虎水流濕火就燥夜合山前石磴幽來來往往的猶是者一道除歲示衆舉百丈海禪師歲暮示衆云你者一隊後生經律論固是不知也入衆參禪禪又不會臘月三十日且作麼生折合去雲峰悅和尚云灼然諸禪德去聖時遙人心淡泊看卻今之叢林更是説不得也所在之處或三百五百浩浩地只以飲食豐隆寮舍穩便為旺化也其中孜孜為道者無一人設有十個五雙走上走下半青半黃會即總道我會各各自謂握靈蛇之寶孰肯知非洎乎挨拶鞭逼將來直是萬中無一元叟端和尚云兄弟當時早有者個説話在今諸方豈堪具述據曲彔木者智眼既已不明擔鉢囊行腳者信根又復淺薄爭人爭我以當宗乘行盜行淫而為佛事身披獅子皮心行野干行聞禪聞道似鴨聽雷視利視名如蠅見血傷風敗教靡不有之師曰諸昆仲看卻今之叢林轉更説不得也你看他靈山會上可有個無行業底佛祖傳燈譜上可有個不持五戒底祖師至於公然飲酒食辛人間赴應口説經法潛行貪欲一類魔子剃卻狗頭入我法中秪圖衣食裨敗如來正所謂師子身中蟲自食師子肉須知古云説得一丈不如行得一尺行解相應名之曰祖諸昆仲今朝是個小年夜秪如諸人大年夜到來又作麼生支遣且莫粗心好縱饒你才智過馬鳴龍樹慧辨過滿慈鶖子三藏十二部經注得如瓶貯水千七百則公案一串穿卻纖毫識漏未盡敢道輪回去在設若是去變大地作黃金供養你非為分外如或不然有寒暑兮促君壽有鬼神兮妒君福珍重辨山結制示衆打三七明朝二七又起今將佛殿更作禪堂與諸昆仲結法因緣已證者脫黏內伏未證者正好精進乃舉昔有比丘厭喧求靜向深山古室中夜坐偶一小鬼拖一死尸從外而入復一大鬼隨至小鬼方置死尸欲噉大鬼向前爭食二鬼爭奪不已便請比丘作證比丘恐懼私自曰若畏大鬼則犯妄語罪不若從實證明乃曰此實小鬼拖來大鬼瞋怒將比丘左臂拔下小鬼拔死尸左臂湊上大鬼又將比丘右臂拔下小鬼又拔死尸右臂湊上如是大鬼以左右兩腿拔下小鬼亦如是湊上二鬼將比丘新肉一齊飽食而去比丘豁然如睡夢覺如病出汗見身如故獲心清淨證無漏果大衆且道比丘所悟底是個甚麼已證未證不妨再證取看因事示衆舉華嚴經云心不妄取過去法亦不貪著未來事不於現前有所住了達三世悉空寂又云識心達本源故號為沙門每見一類假衣竊食之流不知最初如何出家如臭鴉趣食的相似身在樹上心存糞中真箇可憐生古聖出家等身世若幻夢視名利如雜毒孜孜業業惟道是崇親近有德動歷寒暑或十年二十年不動不變成大器播美名今其不然最初出家全無正信猢猻子全然不死一味以聰明伶俐業識之心當為己躬實際身在叢林心存朝市或因口腹攀緣或因貨利奔競至於星相醫卜靡所不為或時東探靜室西採道場甚至於據大位稱宗師者將錢買院結好貴人苞苴骯髒百種營謀東處坐席未溫西處又安職事南地一法子北地一當家蒼天蒼天何緣至此人生幻寄大夢有幾不見雲居膺禪師將示寂職事云和尚將後誰繼住持師拈筆大書堂中簡主事五字擲筆而逝職事僧初意第二座不知囑簡也及簡臨事號令皆不從簡察知拂衣著草履下山忽空中有神作悲哀聲曰和尚去也衆始懼趕至瑤田莊哀懇請回及回空中神忽作歡喜聲曰和尚來也咦此與謀住持底當何如哉又即菴禪師始登雲居時先夕宿瑤田莊夢伽藍神安樂公曰汝與此山秪有一粥緣明午至寺晚參罷會同袍二僧鬥狼聞於寺司凡新到例遭斥逐師深切疑訝後開法已老住歸宗蜀士有官達於朝者與師親厚以雲居虛席請師補處師欣然承命將復徵往夢境至瑤田莊而寂又前定録云韓晉公在中書因召一吏不時至公怒將撻之吏曰某有所屬不得遽至乞宥某罪公曰宰相之吏更屬何人吏曰某不幸兼屬陰司公以為不誠怒曰既屬陰司有何所綰吏曰某土三品已上食料公曰若然我明日當以何食吏曰此非細事不可顯之請疏於紙過後為驗乃如之而繫其吏明旦遽有詔命既對適遇大官進膳有糕麋一器上以一半賜公食之羔又以賜之既而腹脹歸私第召醫者視之曰食物所壅宜服少橘皮湯至夜可啖漿水粥明日愈思前夕吏言召之視其書則皆如其説公因復問人間之食皆有籍耶答曰三品已上日攴五品已上而有權位者句攴凡六品者季攴其有不食祿者歲攴古德常云一飲一啄皆有數分豈偶然哉正信出家之士作此無慚德可乎速當自勉示衆舉高峰妙禪師示衆云海底泥牛銜月走崖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽此四句中有一句能縱能奪能殺能活若人檢點得出許汝一生參學事畢師曰高峰抖擻屎腸無非為禪家抽釘拔楔有一等瞎漢更逐句著一頌此等瞎禿自己沒眼又帶纍他後人可謂知恩者少負恩者多雲門今日將法華鼻孔穿來亦有四句諸佛未出世天傾東南祖師未西來地虧西北佛法遍天下南有萬斛舟談玄口不開北有千人帳此四句內亦有一句能縱能奪能殺能活若人檢點得出亦許你一生參學事畢還有麼衆無出師擊如意孤負山僧除夕示衆古人烹露地白牛與大衆分歲未免將常住物當人情今日藥山初住雖百種荒唐卻有一些供養堆得盤滿得盞的是木札羹搓得圓捏得匾的是鐵酸餡苟有箇漢一咬粉碎藥山功不浪施若或粘牙搭齒莫道沒有事在小參上方入院小參永嘉謂建法幢立宗旨明明佛敕曹溪是第一迦葉首傳燈二十八代西天記所謂有為雖訛棄之則功行不成無為雖真趨之則聖果難剋若論建法幢立宗旨華嚴云雖得諸佛平等智而樂常供養佛雖入觀空智門而勤集福德雖離三界而莊嚴三界雖畢竟寂滅諸煩惱焰而為一切衆生起滅貪嗔癡諸煩惱焰雖知諸法如幻如夢如影如響如焰如化如水中月如鏡中像自性無二而隨心作業無量差別雖知一切國土猶如虛空而能以清淨妙行莊嚴佛土如此方是現前大衆請入上方之本意也且如何是沙門為法為生的本意良久曰將此身心奉塵剎是則名為報佛恩辨山入院小參山僧憶自辛巳冬月送先老人入塔後浪迹江楚十有七載幾欲歸來拈一瓣香竟未如願年來病憊通身拋卻兩處院子準擬活埋廬阜以息殘喘不意逼來到者裏自揣孤陋不敢飾辭適承諸公請法山僧子細思量説箇甚麼即得若説真如佛性菩提涅槃是繫驢橛子若説向上向下是諸方掉下的麻根檗滓若説乾屎橛麻三斤柏樹子東山水上行炙豬左膊上總教作今時鑽破卦文兄弟多是久歷諸方潛牙伏爪的山僧又無印板上打來模子裏脫出的畢竟説箇什麼即得設謂今日請説些新鮮佛法但向道今日入院事忙晚參拈拄杖曰長言短語答去問來不令人墮狂見知解便令墮荊棘林裏無指示無標的不令人墮黑山鬼窟便令人坐在淨白地上今晚倒腹傾腸八字打開待汝諸人立地搆去還有具金剛眼睛底麼有僧方出禮拜師便起身歸方丈晚參盡虛空遍法界是箇大地獄未審諸仁者如何出脫沉空滯寂者是寒冰鐵柱舉止妄動者是劍樹刀山燋煩爆燥者是火坑油鍋語言學解者是刀割鋸𨮂思而知慮而解是奈河鑊湯有趣向有依倚是碓搗磨磨且學道人有何三昧能出諸獄晚參師屈指云結制已九日起七已四宵拈起拂子又道穿卻你諸人眼睛放下拄杖又道壓碎你諸人髑髏今也不拈拂子亦不放拄杖平實商量商量看遂熄兩燭倒插爐中復脫一鞋覆香爐上且道者是箇甚麼義一僧才出師便歸方丈古洞山晚參若論此事太煞現成因甚卻成難去蓋你無量劫來熟習濃厚情濤識浪膠膠固固流浪前塵以至如此幸今不昧知有生死可怖妙悟可期入此門來苟能放下娘生面皮捩轉從前鼻孔將生死兩字撮在眉毛尖上提箇本參話頭心心爾念念爾逼將去正向去不得處或聞聲或見色一日豁然本自圓成非從他得雖然如是此正喚作獠狂子之方診一時之痛秪如本來人還假修證也無良久云大唐天子不肚飢無限陸沉遭渴死夜參舉黃檗和尚曰塵勞迥脫事非常緊把繩頭做一場不是一番寒徹骨爭得梅花撲鼻香雲門老祖曰豎起脊梁生鐵鑄放下面皮莫回顧猶如象王脫金鎖若不如是何劫悟雖則應病施藥可謂醫王妙手若是具百千三昧大總持法門別有一偈只是被口唇舌根礙了待拄杖子出來作箇通事舍人以拄杖向空畫於此透得洞山分付你拄杖子夜參以杖左卓曰昏散重底者邊立右卓曰昏散輕底向者邊立衆左右分立師復云左底左立右底右立中間意旨各道一句看衆無出驀豎拄杖曰者一夥瞌睡漢總不伶俐一齊打散歸方丈夜參師以石灰畫一圓相於地問衆曰二七將完各各向者裏通箇消息看道光出衆以坐具覆卻師曰是何意旨光曰夜深天寒請和尚歸方丈師把住連打七棒曰者是僧堂裏且只打七棒便回光復呈偈曰艇釣寒江月一簑縱橫文彩意偏多花橈傾落千波隱爭奈魚龍識水向師曰更要棒喫辨山晚參舉僧問洞山寒暑到來向什麼處回避山曰何不向無寒暑處回避僧云如何是無寒暑處山曰寒時寒殺闍黎熱時熱殺闍黎曹山霞因僧問熱向什麼處回避山云向鑊湯爐炭裏回避曰鑊湯爐炭裏又作麼生回避山云衆苦不能到師曰一人向忘功罷位處垂手一人向古鏡潛輝處出身可煞穩坐家堂封疆迥絶檢點將來畢竟圓活者僧不得設問辨山寒暑到來向甚麼處回避但向道在你頂𩕳上回避或云因甚在學人頂𩕳上回避更向道要為你眼裏拔屑腦後抽釘夜參舉昔有僧在古德會下住一夜在衆拊掌呵呵大笑云我大悟也我大悟也凌晨古德上堂云大悟底僧出來僧出德云你見箇甚麼道理稱大悟僧云師姑元是女人做德便休去師曰者僧大似貧兒暴富未免虛張聲勢古德惜乎無換命奪胎的手段致令後世往往循途守轍魚魯刁刀者何限辨山者裏滿堂龍象起七來或聞聲解脫或見色知歸不少其人只有一種黑漆皮燈籠見色如盲聞聲如聾無可奈何驀豎拄杖曰還知麼者一夥瞌睡漢不打更待何時遂一齊打散歸方丈結制晚參諸昆仲還知麼空劫來事只是如今須知如今底事即是空劫底事如今了去即空劫事了如今不了則大有事在古人道堂內坐禪堂外禪坐又曰終日忙忙那事無妨又曰一時不在如同死人即今衆職如此殷勤莫不為汝諸人助成道業參學高流大須仔細除夕小參瞬息一周今又盡百年好向此中看塵勞碌碌如陽焰識念紛紛似火團碧嶂只聞玄鳥集黃泉不見去人還殷勤報與諸禪侶莫把光陰作等間
