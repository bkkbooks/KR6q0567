body:
  text: 元潔瑩禪師語録目録卷第一住洪都寧州古洞山阿耨禪寺語録住楚蒲圻玉崖山上方禪寺語録卷第二住浙江湖州辨山龍華禪寺語録住江南廣陵平山棲靈禪寺語録卷第三住洪都寧州雲巖無住禪寺語録卷第四住澧州藥山慈雲禪寺語録復住寧州雲巖無住禪寺語録卷第五住越州雲門顯聖禪寺語録住台州天台護國禪寺語録卷第六示衆小參卷第七普説垂語代語機緣卷第八拈古頌古卷第九代古法語示語佛事卷第十像贊行狀塔銘元潔瑩禪師語録目録終
