body:
  text: 嗣法門人智禪編普説洞山告香普説若論此事本自現成不假修為無容造作擬求轉遠趣向即乖亙古亙今了無向背所以道神光不昧萬古徽猷入此門來莫存知解知解者何乃意識偷心耳亦謂之世智辨聰教中尚且最忌況祖師門下故永嘉謂損法財滅功德莫不由茲心意識你看他世間多少好人向閻浮提有佛法世界被箇聰明伶俐心誤都道我知我解瞞過一生只如出世間人視身世如浮雲棄所重如敝屣心形易俗發足超方訪明師近高德所為何來莫不皆為曠大劫來迷頭認影生生死死輪回不了底公案諸佛諸祖遞相出興開示悟入謂之一大事因緣若欲脫此輪回生死參須真參悟須實悟不可認箇昭昭靈靈門頭戶底見聞覺知強作主宰底以為究竟此或曲盝床上老禿頭不得已要汝直下知有不向外求底初心方便如其執定將為是了何異認驢鞍橋作阿爺下頷不見楞嚴會上阿難認能推者為心世尊呵他認賊為千長沙和尚亦曰學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人果是真正道流必欲破此生死結元將平昔所知所解蘊籍得底一拋拋下放教百不知百不會如箇喫得飯的死人一般卻教生處熟熟處生瞪開兩眼捏定雙拳將通身一具骨節八萬四千毛竅併作一箇本參話頭頓在面前如遇著歷劫生冤家相似一扣扣定永不放捨亦如獨自秉一柄金剛王寶劍在百萬軍中求出路相似一切利害總莫管他稍若顧著些見則心弱膽怯不濟事也直把者見聞覺知底偷心揮教淨盡無餘不知喫飯不見穿衣不知行不知坐便是好時節也此時要知不可坐住耽著靜境恐其一切魔境喜樂悲哀隨念而入佛亦難救縱遇佛菩薩境現前也與一揮猛著精彩極力揮到措手不及處奮命一揮直教虛空粉碎大地平沉死去十分醒轉眼來不妨向見聞覺知裏呵呵一笑無事不了方知佛祖無有瞞人底道理古今善知識無有欺人底心行正所謂懸崖撒手自肯承當絶後再蘇欺君不得始可與祖師門下解粘去縛敲枷打鎖有喫棒分如其自不努力無決定志無勇猛心似信不信如存若亡要他無量劫來猢猻子死業識心破輪回念空到大休大歇大安樂田地不啻身在家庭而欲到帝京口説心不行終無可到底日子亦不可謂空境空心忘我忘物當為究竟縱空得心若淋過死灰一般忘得形似朽株稿木無二有甚用處縱爾一念萬年一劫萬劫至於八萬四千劫大定也不過是落空亡底外道魂不散底死人於此事上了沒交涉況復亦有未到他死灰稿木田地者無明現行念念不停識火交煎新新不住生大我慢不覺其非此喚作業鬼賊住若不真實體究一番打教徹去是自暴自棄自哄自瞞自甘沉淪喚作愚癡狹劣衆生向衣線下錯過時光錯到眼光落地之時心漏未盡毫釐差忒又不止千生萬劫錯過也待出頭來再欲真參實悟要了者箇生死業識知是幾時可惜可惜上方普説擊如意曰諸昆仲結制來一月已且道者箇還有許多禪道佛法麼還有許多凡情聖解麼還有許多惡知惡覺麼既總不得還向者裏安得箇名立得箇字麼所以古人道未得箇入處須得箇入處既得箇入處又須求箇出處始乃安間不居惑地達磨老祖來我東土為法求人九載嵩山三拜而起只接得箇斷臂老子此是第一箇不受或底樣子也今人信根淺薄一向情見識測浪走前塵朝三暮四逐外馳求空增迷悶看他古宿一踏到底的大梅參馬大師問如何是佛大師云即心是佛便去住山後大師令僧問見箇什麼道理便住此山梅云大師向我道即心即佛僧云近日大師佛法又別也梅云作麼生別僧云又道非心非佛梅云者老漢惑亂人未有了日在任他非心非佛我只管即心即佛此是第二箇不受惑底樣子也金陵玄則禪師從青峰會下往參法眼眼問甚處來則云青峰來眼云青峰有何言句則云學人問如何是學人自己他道丙丁童子來求火我便會得眼云你作麼生會則云丙丁屬火火來求火如將自己覓自己也眼云恁麼會又爭得則云某甲只與麼未審和尚如何眼云你問來與你道則理前問眼云丙丁童子來求火則於言下大悟方始休歇獲大總持此是不自欺枉底第三箇樣子也又僧問歸宗如何是佛宗云我向汝道恐汝不信僧云和尚誠言焉敢不信宗云即汝便是進云如何保任宗云一翳在眼空花亂墜僧從此悟入你且道者僧悟得箇甚麼又不見水潦禮馬祖問如何是佛法大意祖便一踏潦起來呵呵大笑曰百千法門無量妙義向一毫頭識得根源去後來上堂每云自從一喫馬師踏直至於今笑不休有老宿尚不肯放過道何不更與一踏諸昆仲大凡參禪只要掀翻窠窟截斷命根儻若些些識漏未盡總是倚草附木再或悠悠洋洋縱有一知半解不過走到三家村裏覓箇茅菴破院便恁麼虛度一生了也汝等從今發廣大心奮決定志參須真參悟須實悟閻羅老子不管你聰明久立珍重打七普説山棲草搆多寡同居莫不皆為痛念生死以求決擇以結同志同期妙悟同出生死同至誠同精進乃為得也今一七完昏沉散亂尚未清楚便要放一放參若是真為生死者那裏分晝分夜分七分五一日不明便一日過不去如何一期還未動頭便見一箇箇鬆鬆懈懈如此參禪學道也大難在山僧向在方外多見此輩初發心本無為究竟生死之念不過見禪師名目好聽也入衆參禪打坐先幾日還有些精彩及至過了一七二七三七便恁麼挨過了至於一兩期疲疲搭搭日久歲深叢林裏混得熟不思深進一箇體面心放不下半青半將箇強作主宰底茫茫業識以謂是了便道我是禪師今見衆兄弟不畏深山清苦動經千百里跋涉來此箇箇都有些氣息以故山僧監了一七昨借古人策進偈云學道如鑽火逢煙未可休直待金星現歸家始到頭如此明白還亂打之繞也教是參禪底衲僧誠可恥也古人痛念此事朝不眠夜不睡設出種種計較或不敷床凳或不展被單或足不離地或以頭觸柱或引錐自刺或懸梁柱經行或以禿針刺股甚至於食才接氣身不求暖脅不至席節食卯齋拚一生不學佛法拚一生做箇癡呆漢畢竟要者著子明白種種磨鍊種種自勵豈有他哉只期了證了悟慶快平生而已不是以一機一境一箇歡喜為自足者所以古云成辦此事須是生鐵鑄就底漢子始得豈欺人哉況今箇箇離了師長父母拋了至恩至愛至放不下者也教放下來此山中莫是為三餐薄粥兩箇普梆麼莫是為一碟虀半盞冷豆渣麼大家檢點檢點看還知慚愧麼結制已是半月去了看你們一期完了做得箇什麼出堂再到他日做得箇什麼出山悠悠洋洋只恐向後遇著舊知舊識還是舊日底一箇無知痛癢漢耳可惜可惜天寒珍重因事普説夫屬招提者衆僧共有之物也禪堂者衆僧辦道之處也結制者為曠劫來生生死死路頭不明結束身心之所設也既入堂已工夫不能成片故又有結甲打七剋期取證之舉山僧向在林下竊見叢林不體先聖垂範假衆僧結制打七之名以為取利肥身之券化檀越夜供謂之放忝殊不知此是減滅佛祖慧命之肇也若以暮夜小食豐隆為得計何不移於日用普心事衆無所匱給得不謂之滿足菩提行耶凡人一切昏懵愚濁莫不皆以飲食過分蔽塞妙明故良家子弟善教導者食必有節睡必以時況出世間人心期至道以無大不大底一件事不得了悟不能廢寢忘餐而反暮夜取口食豐隆矯意亂神豈為得計古人雪山麻麥攴命衣取蔽形穴處巖棲刳情泯智年三歲四動經莫紀律中嘗謂過中食令餓鬼聞碗鉢聲咽中火起故飲食之多有妨道業近今時弊夜餐豐饒餖飣煎煮猶盛午齋大家喫了昏沉瞌𥅻磨遣不去如跳神舞鬼的一般轟轟儱儱一七又是一七不覺一期便了哄得一起無正因底間神野鬼一箇瞌𥅻醒來作一首偈念一首詩也道悟了或體面心放不下底如猜謎一般一猜猜著一則公案一箇歡喜便道我無疑了及至日久歲深從前些須境界一點滋味也無被無面目辣手腳漢一搊搊住卻去不得又重新參重新究此還是不肯自欺自瞞底真丈夫只有一種自昧心底瞎禿不求深進胡揮亂霍高談闊論以謂無敵於天下者一盲引衆肓相牽入火坑誤賺他無限初心好人墮野狐隊中以故山僧每見真正道流不能透脫又有大志氣不啻倒懸之憂如出諸己每嘗痛切有言凡建叢林立法幢僧堂如意四事無虧不在暮夜豐隆貴在心清神肅猛力話頭自應廢寢忘餐剋期了辦不見古人聞鄰壁暮夜碗鉢聲乃嘆曰減佛正法五百年難道彼亦不成辦道業乎雖然如是肇公有云夫談真則逆俗順俗則違真違真故迷性而莫返逆俗故言淡而無味緣使中人未分於存亡下士拊掌而弗顧山僧今此無味之談但可與智者道而弗可與愚夫言恐其未分於存亡而撫掌弗顧者亦多矣珍重垂語猛火聚中因甚不藏既到寶山因甚空手而歸腳跟點地底因甚不知下落鼻孔遼天底因甚被人穿卻有口有舌底因甚道不得離卻行在坐臥作麼生行履啞子話古今是何章句春來草自青因甚朽木不芳智有窮幽之鑒古哲因甚不辨劫灰神有會物之功今人因甚觸境茫然盡大地是箇無孔鐵槌試問諸人在椎內在椎外佛身無為不墮諸數因甚又有三十二相上無佛道可成下無衆生可度底人因甚喚作無慚愧漢威音已前且道者片田地是什麼人作主代語師居匡廬垂問八則衆下語不契嵩旭禪師徵問請師復答問五老峰鎮日團圞商量何事代曰近日王令稍嚴徵商量不無阿那箇側耳親聞答患聾作麼問聲不是聲即今水流風動喚作什麼代不可為人更下注腳徵水流風動且從秖如雲散水流去寂然天地空又作麼生答吽吽問無功之功功不虛棄因甚土木瓦石不成道果代太平無朕兆徵土木瓦石不成道果只如塵説剎説又作麼生答許你親見作家來問有功之功功皆無常因什又教參禪學道代若將未歸意説與欲行人徵參禪學道固屬功勳秪如禪道淨盡又向何處辨伊端倪答三十棒自領出去問高高山頂立底人因甚下不得代不遊花下路徵坐著即不堪設若按下雲頭又將何處措置他答著槽廠去問深深海底行的人因甚出不得代豈肯戀芳叢徵要出也不難設若海枯水涸又教他向何處蹲身答通途藏不得遍界絶遮攔問深宮不宿草店不居如何是此人住處代行不越戶坐不當堂徵深宮草店固不安棲若也渠無國土何處逢渠答會麼問有一人千萬人中不背一人有一人千萬人中不向一人阿那箇堪承磨琢代敏手無廢器離文便喪淳徵雕琢一任只如不向一人不背一人底人還解喫飯也無答適來有人恁麼問已打趁出了也建安國主六問上百丈瑞老和尚值已入滅一初禪師請師代答問洞山得雲巖寶鏡三昧以此荷法即應以此建立宗旨何又別設五位君臣豈三昧不足以盡施張耶師答云莫謗洞山好問百丈一日不作一日不食大師既當主位還效古人親躬作務也無答不將家醜外人揚問古人插一莖草建梵剎已竟了心子今豎一指為百丈湧起重重樓閣大師還在裏許住也無住則隨人起倒不住則荒卻祖院孤負來意了也答有勞道用問人死留名豹死留皮未審虛空消殞留箇什麼答獨露大雄峰問人飲水則知冷暖為甚柳眼垂青桃腮呈笑覿面不見喚作瞎漢得麼答不許夜行投明須到問了心子有顆無價寶珠出賣又不作貴賤不得語默請師酬價若道得即置之雄峰絶頂而作供養道不得收入無盡藏答誰敢埋沒石田上座問鯤化鵬眼在魚化龍鱗在生化死何在師答云通途無影象遍界不曾藏飢者易為食渴者易為飲藥山化主因甚不受甘贄錠金答寧知魚腹劍要斬不平人悟了同未悟歸家尋舊路未審早晚從那邊來答日出海門東扶桑最先照暫時不在如同死人為復是已悟人底事未悟人底事答大唐天子不肚飢賊不打貧兒家臨濟因甚見僧便喝德山見僧便棒答知恩者少負恩者多僧請益七問暗中樹影水底魚蹤明眼人因甚不見師答循途亡侶伴密室不挑燈是法住法位因何象王之膽不定局答黃河九曲離匣寶劍為斬不平因何臨濟吹毛揮佛祖答寰中天子敕塞外將軍令犀因玩月紋生角象被雷驚花入牙意作麼生答鷺翻荷葉雨麥秀捲簾風古德云心月孤圓光吞萬象因何被天狗食卻半邊答法出好生惟此一事實餘二則非真因甚有三玄五位答將謂闍黎兩眼明明遠座主參問芭蕉因甚聞雷而長師曰腐草逐流螢磁石為甚見鐵疾上師曰貓兒愛捉鼠鵠非洗白烏非染成各有原由為甚虎生豹子師曰南地橘北地枳椒花係是天資物因甚女人摩觸繁螽如是師曰榮辱不隨無馬客是非偏向有錢家一切人造業被閻羅老子賞罰秪如閻羅王還有罪過也無師曰都城紙貴僧請益鏡清八問時至草菴無一物為什卻有盈餘師曰平蕪盡處碧天寬盡乾坤不出一剎那今時人向什麼處辨明師曰錯過也不知無神通菩薩為甚麼蹤迹難尋師曰家裏無奴婢辨得親疏底人為什卻被親疏不肯師曰猩猩草鞋明知生是不生之理為甚卻被生死之所流轉師曰葫蘆浪裏顛機緣僧問如何是向道莫去師曰長安竟日無人到曰如何是歸來背父師曰月沉滄海沒西東僧問如何是救即雙目不睹師曰動絃別調曰如何是不救則形影不彰師曰葉落驚秋僧問牛頭未見四祖為甚百鳥銜花師曰國富自民殷曰見後為什麼不銜花師曰人貧兼智短僧問清淨本然云何忽生山河大地師曰我家是廣陵曰秪如純清絶點時如何師曰我者裏無者間家具曰便恁麼去時如何師曰客作漢僧問如何是翻身一句師曰虛空𨁝跳曰正翻身時如何師曰粉碎髑髏曰翻身後如何師曰山上雲澗下水師拔蘿蔔次有僧問學人誦金剛經不明四相乞師指示師曰你那裏人曰湖廣師曰此是我相復指蘿蔔曰你那裏有者箇麼曰有師曰此是人相復曰者箇喚作什麼曰蘿蔔師曰此是衆生相若喚作蘿蔔入地獄如箭速道速道僧擬議師曰此是壽者相僧喜躍作禮而退僧問作麼生是沿流不止問如何師曰倚天長劍逼人寒如何是真照無邊説似他師曰大地血淋淋如何是離相離名人不稟師曰可惜許秪如吹毛用了急須磨又作麼生師打曰者驢漢打殺千百箇有什麼罪過直打出方丈僧問至道無難唯嫌揀擇還揀擇是不揀擇是師曰山僧有口秪堪喫飯清侍者請益三種滲漏師曰莫管滲漏不滲漏你自己事作麼生曰不守自己師曰此是見滲漏曰受用活鱍鱍師曰此是情滲漏脫體道一句來曰萬機收不得一句豈能該師曰此是語滲漏清擬進語師連拳打出僧持穀山中也和尚垂問夜半一天紅日朗為甚天明依舊黑漫漫請師代師曰石虎産麒麟泥牛吞玉象師過新昌洞山已任西堂與衆謙讓不做主人師曰釋迦老子生下便手指天地道唯我獨尊任曰智度直下承當又將和尚置甚麼處師曰全得汝力僧問如何是死句師曰者是拄杖子如何是活句師曰跌作三千段如何是位師曰泥牛眠古井如何是機師曰石虎入羊群如何是機不離位師曰弄潮人在潮中死如何是離位之機師曰一箭過新羅僧拜起侍立師伸手索曰還有麼僧無語師便打師一日到省建安王請會方坐定王曰儒書中唯上智與下愚不移適來商略俱不暢快請師教之師舉首笑曰殿下會麼王曰不會師曰會則上智與不會則下愚不移王沉吟連點首笑曰妙妙少間齋次王又曰適早一僧從雨中來不肖問他從什麼處來他道從雨空裏來不肖曰秪如傾湫倒嶽又作麼生來其僧無語不肖曰好與三十棒可當也無師云者僧聻王曰當時去也師曰三十棒教誰喫雪日問僧雪覆大千還有不白處也無僧曰有師曰作麼生是不白處僧曰杲日當軒師曰未在僧曰和尚又作麼生師曰乾坤無朕迹大地沒蹤山師在天台眠石師與破暗師廊下論三量師從傍過眠把住曰正要箇同流論三量師豎起拳曰者是那一量俱無對師拂袖曰將謂同流師在崆洞同衆圍爐次一僧問古德曰火爐頭有箇無賓主話請兄布施師曰到我舉也未僧罔措復問師曰我為汝眉毛落了幾莖克歸曰燒卻了也師曰道我眉毛在什麼處歸打一掌師曰又道燒卻了連掌掌出辨山老和尚舉僧問洞山蛇咬蝦蟆因緣問師曰為甚救即雙目不睹師曰瞎山曰不睹已是瞎了師曰今日也不得孤負和尚隨呈頌二首救即雙目不睹頌曰王人夢破一聲雞古鏡臺前不展眉徹曉任教紅日冷不將白髮混塵泥不救即形影不彰頌曰玉鼎調寬四海寧干戈不動自升平凌煙傑閣煙籠曉任運相將不得名一日堂中打鐘山問衆曰什麼聲一僧云鐺山曰説得道理好一僧云寂山曰説得道理好又問師師曰説得道理好山打一竹篦圍爐次山舉古德曰火焰為三世諸佛説法三世諸佛立地聽問衆畢師從外至山復舉問師曰他等都道不得你來分析看師躬前問訊曰贛城紙貴一狀領過別有顧問再乞垂慈山打一火箸師便出一日大雪山問正恁麼時如何師曰迥然無異色山曰日出後如何師曰那更有蹤出常住牛死山垂問曰既是常住底牛因甚死了師曰懶耕祖翁田地豈拖今世犁耙復頌曰懶耕祖翁田地豈拖今世犁耙好笑黃頭碧眼羊車鹿車牛車山示寂後師送龕至辨山回寓濟生菴有小西天數梵僧至謂通佛法余中丞與衆居士請師勘過師豎起一指梵僧豎兩指師畫相梵僧於中添一點師以手抹卻梵僧以手點胸曰都説者箇心那師謂衆曰莫被他謾好師謁天童悟和尚與數起新到人事次童問汝等都是那裏一僧曰某甲在浮山住靜童曰山也是動底住箇什麼靜僧無對童顧師師曰動也動也便禮拜童打一棒次日石車禪師自金粟來覲天童到客樓相看乃曰汝諸公為老人來者為朝海來者師曰也有為老人來者也有為朝海來者車曰且道觀音菩薩在什麼處師鳴指一下曰只是不許作道理會車便掌曰誰不知汝是辨山來底師曰識甚好惡一日挑萬工池有僧號鹽梅者欲與師説話不得忽在後高聲喚曰那禪師看腳下師轉頭曰一日到夜不知踏殺多少梅便喝師曰還亂叫師問僧本分事如何僧曰昨日今朝師曰未在僧曰未在什麼處師曰昨日今朝又問賓即不問如何是主師曰今夜不答話曰不落正偏請師道一句師曰沒者間工夫僧問新年頭人人都遊山未審妙峰頂作麼生遊師曰何不問山僧僧擬重舉師劈胸一拳曰古佛過去久矣僧禮拜師直打出又僧進問善財童子參德雲比丘七日不見因什在別峰相見師曰古路草漫漫僧便拜師曰你見箇什麼道理便拜僧擬開口師亦打出熊百子居士入山師曰侍者因甚不先通知士曰嘗聞古尊宿有護法檀越入山土地神預報師曰妖不勝德士沉吟復問如何是非非想處師曰居士家中有人相喚又問如何是此君軒師曰何得當面昧卻士曰莫就是主人公麼師曰正是奴兒婢子僧問文殊七佛之師因甚出女子定不得師曰昨日天晴進曰罔明因甚出得師曰今朝下雨虎巖主拂參問急切相投句請師通一音師曰天曉無覓處曰恁麼則新豐無絃韻虎巖也解拈師曰歸家莫問程巖便拜師曰偏處不逢玄中不失秪如正位作麼相見巖側身拱立師便歸方丈巖歸客位明日師問秪如金鳳不棲無影樹澄潭豈墜於紅輪又作麼生巖曰丹山生鸑鷟鐵象産麒麟師休去師過法昌冰鑒禪師問如何是金針師曰若將耳聽終難會昌曰如何是玉線師曰夜半繡鴛鴦天曉無蹤迹昌曰如何是妙峰孤頂師曰打殺老僧不向你道昌曰必要更道師曰任從滄海變終不與君通昌曰秪如別峰一句又作麼生師曰大家在者裏僧問古德曰紅塵堆裏即是山居和尚為什麼隱山師曰舉眼盡是兒孫事進曰古德一生不見人時如何師曰何處孤負汝進曰隱山是不隱山是師曰分身兩處看僧問從上公案即且置只如透網金鱗如何下釣師曰無者間工夫進曰恁麼則辜負學人去也師曰可惜不知恩曰誰是知恩者師曰大地沒飢人僧便作禮黃白峰居士謁師問曰久響和尚及至到來卻又不見師曰甚處去也士曰遍界不曾藏師曰又道不見士復曰諸佛未出世鼻孔遼天出世後音信杳然和尚出世後如何師曰滿眼滿耳絶消息士曰如何是洞山無孔笛師良久曰聞麼士曰白峰無孔笛聲高會者稀幸遇知音者故向洞山吹師曰如何是白峰無孔笛士亦良久師曰少有知音士遂歸客位復至師曰死水不藏龍活水龍不住龍在什麼處士曰和尚見麼師曰念汝新到且坐喫茶隨盤桓數日以偈辭師曰寶鏡堂前面目親眉毛傳得老師心逢人鐵蒺藜相贈説是新豐最上珍師以偈贈曰古殿風高萬象寒海天雲樹雪漫漫雙雙鳥履衝陽焰自是心安境亦安
